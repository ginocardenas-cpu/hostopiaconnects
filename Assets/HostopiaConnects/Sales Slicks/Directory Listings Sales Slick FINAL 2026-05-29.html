  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

1, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"0c828cee-d2c7-453a-9bb5-134c61dbce90\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"a98080ad-103d-4f51-bacb-ecf99dea9932\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ---------- Design system tokens ---------- */\n:root {\n  /* Color */\n  --ink: #1A1F2B;\n  --ink-2: #3A4150;\n  --ink-3: #6B7280;\n  --rule: #D9D6CF;\n  --rule-2: #E8E5DD;\n  --paper: #FAF7F0;\n  --paper-2: #F5EFE3;\n  --paper-3: #EFE8D8;\n  --white: #FFFFFF;\n\n  --teal: #0F6E6E;\n  --teal-deep: #0A4F4F;\n  --teal-pale: #E0EBEA;\n  --teal-tint: #F1F6F5;\n\n  --cream: #F5EFE3;\n  --accent-warm: #C2895A;   /* sparingly */\n  --accent-warm-pale: #F0DFC8;\n\n  /* Type */\n  --serif: \"Newsreader\", \"Source Serif Pro\", Georgia, serif;\n  --sans: \"Geist\", \"Inter Tight\", system-ui, -apple-system, sans-serif;\n  --mono: \"Geist Mono\", \"JetBrains Mono\", ui-monospace, monospace;\n\n  /* Misc */\n  --maxw: 1280px;\n}\n\n/* Reset-ish */\n*, *::before, *::after { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  font-family: var(--sans);\n  color: var(--ink);\n  background: var(--paper);\n  font-feature-settings: \"ss01\", \"cv11\";\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---------- Typography ---------- */\n.serif { font-family: var(--serif); }\n.sans { font-family: var(--sans); }\n.mono { font-family: var(--mono); }\n\n.eyebrow {\n  font-family: var(--mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--teal);\n}\n\n.label {\n  font-family: var(--mono);\n  font-size: 10.5px;\n  font-weight: 500;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--serif);\n  font-weight: 400;\n  letter-spacing: -0.01em;\n  margin: 0;\n  text-wrap: balance;\n  color: var(--ink);\n}\nh1 { font-size: 72px; line-height: 0.98; font-weight: 380; }\nh2 { font-size: 44px; line-height: 1.05; }\nh3 { font-size: 26px; line-height: 1.15; }\nh4 { font-size: 18px; line-height: 1.2; font-family: var(--sans); font-weight: 600; }\n\np { margin: 0; font-size: 15.5px; line-height: 1.55; color: var(--ink-2); }\np.lede { font-size: 19px; line-height: 1.5; color: var(--ink); text-wrap: pretty; }\n\n/* ---------- Reusable components ---------- */\n\n/* Big stat */\n.bigstat {\n  font-family: var(--serif);\n  font-weight: 380;\n  font-size: 120px;\n  line-height: 0.92;\n  letter-spacing: -0.025em;\n  color: var(--ink);\n  font-feature-settings: \"lnum\", \"tnum\";\n}\n.bigstat .unit {\n  font-family: var(--sans);\n  font-size: 0.28em;\n  font-weight: 500;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  vertical-align: 0.45em;\n  color: var(--teal);\n  margin-left: 0.08em;\n}\n\n/* Rules */\n.rule { height: 1px; background: var(--rule); width: 100%; }\n.rule-ink { height: 1px; background: var(--ink); width: 100%; }\n.rule-teal { height: 2px; background: var(--teal); width: 48px; }\n\n/* Square accents - picking up DNA from the original */\n.squares {\n  display: inline-grid;\n  grid-template-columns: 12px 12px;\n  grid-template-rows: 12px 12px;\n  gap: 3px;\n}\n.squares span { background: var(--teal); display: block; }\n.squares span:nth-child(2) { background: var(--cream); }\n.squares span:nth-child(3) { background: var(--accent-warm); }\n.squares span:nth-child(4) { background: var(--ink); }\n\n/* Image slot — drop-in placeholder */\n.imgslot {\n  position: relative;\n  background:\n    repeating-linear-gradient(135deg,\n      var(--paper-3) 0 1px,\n      transparent 1px 12px),\n    var(--paper-2);\n  border: 1px solid var(--rule);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  text-align: center;\n  color: var(--ink-3);\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n}\n.imgslot::before {\n  content: \"\";\n  position: absolute;\n  inset: 10px;\n  border: 1px dashed var(--rule);\n  pointer-events: none;\n}\n.imgslot > span {\n  position: relative;\n  background: var(--paper);\n  padding: 6px 10px;\n  border: 1px solid var(--rule);\n}\n.imgslot.dark {\n  background:\n    repeating-linear-gradient(135deg,\n      rgba(255,255,255,0.04) 0 1px,\n      transparent 1px 12px),\n    var(--teal-deep);\n  border-color: var(--teal-deep);\n  color: rgba(255,255,255,0.7);\n}\n.imgslot.dark > span { background: var(--teal-deep); border-color: rgba(255,255,255,0.2); }\n\n/* Badge / pill */\n.pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--ink);\n  padding: 5px 10px;\n  border: 1px solid var(--ink);\n  border-radius: 999px;\n  background: transparent;\n}\n.pill.solid { background: var(--ink); color: var(--paper); }\n.pill.teal { border-color: var(--teal); color: var(--teal); }\n.pill.teal.solid { background: var(--teal); color: var(--paper); }\n.pill .dot {\n  width: 6px; height: 6px; background: currentColor; border-radius: 50%;\n}\n\n/* Number marker (01, 02...) */\n.num {\n  font-family: var(--mono);\n  font-size: 12px;\n  font-weight: 500;\n  letter-spacing: 0.1em;\n  color: var(--teal);\n}\n.num.lg {\n  font-family: var(--serif);\n  font-size: 56px;\n  font-weight: 380;\n  line-height: 1;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n}\n\n/* Card */\n.card {\n  background: var(--white);\n  border: 1px solid var(--rule);\n  padding: 28px;\n}\n.card.cream { background: var(--paper-2); border-color: var(--paper-3); }\n.card.ink { background: var(--ink); color: var(--paper); border-color: var(--ink); }\n.card.teal { background: var(--teal); color: var(--paper); border-color: var(--teal); }\n\n/* Layout helpers */\n.flex { display: flex; }\n.col { display: flex; flex-direction: column; }\n.between { justify-content: space-between; }\n.center { align-items: center; justify-content: center; }\n.gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; }\n.gap-24 { gap: 24px; } .gap-32 { gap: 32px; } .gap-48 { gap: 48px; }\n\n/* Logo showcase — sample-work grids */\n.logocard {\n  background: var(--white);\n  border: 1px solid var(--rule);\n  aspect-ratio: 4/3;\n  display: flex; align-items: center; justify-content: center;\n  padding: 18px;\n  overflow: hidden;\n}\n.logocard img {\n  max-width: 100%;\n  max-height: 100%;\n  object-fit: contain;\n  display: block;\n}\n.logocard.cream { background: var(--paper-2); border-color: var(--paper-3); }\n.logocard.ink { background: var(--ink); border-color: var(--ink); }\n\n.logogrid {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 8px;\n}\n\n/* Brand mark — generic, swappable */\n.brandmark {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--ink);\n}\n.brandmark .glyph {\n  width: 22px; height: 22px;\n  background: var(--teal);\n  position: relative;\n}\n.brandmark .glyph::after {\n  content: \"\";\n  position: absolute;\n  right: -6px; bottom: -6px;\n  width: 12px; height: 12px;\n  background: var(--cream);\n  border: 1px solid var(--teal);\n}\n<\u002Fstyle>\n\n\n<style>\n  body { background: #2a2e35; padding: 48px 0; }\n  .stack { display: flex; flex-direction: column; gap: 32px; align-items: center; }\n  .page { width: 850px; height: 1100px; background: var(--paper); color: var(--ink); position: relative; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.4); }\n  .page-chrome-top, .page-chrome-bot { position: absolute; left: 56px; right: 56px; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); display: flex; justify-content: space-between; align-items: center; }\n  .page-chrome-top { top: 36px; }\n  .page-chrome-bot { bottom: 36px; padding-top: 14px; border-top: 1px solid var(--rule); }\n  .page-body { position: absolute; top: 80px; bottom: 80px; left: 56px; right: 56px; display: flex; flex-direction: column; }\n  h1.p-hero { font-family: var(--serif); font-weight: 380; font-size: 50px; line-height: 0.98; letter-spacing: -0.015em; }\n  h1.p-hero em { font-style: italic; color: var(--teal); }\n  h2.p-sect { font-family: var(--serif); font-weight: 400; font-size: 30px; line-height: 1.1; }\n  h4.p-card { font-family: var(--sans); font-weight: 600; font-size: 14px; line-height: 1.25; }\n  .p { font-size: 13px; line-height: 1.55; color: var(--ink-2); }\n  .p-sm { font-size: 11.5px; line-height: 1.5; color: var(--ink-2); }\n  .p-eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--teal); }\n  .p-label { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }\n  .p-stat { font-family: var(--serif); font-size: 46px; line-height: 0.92; font-weight: 380; letter-spacing: -0.025em; }\n  .p-stat .u { font-family: var(--sans); font-size: 0.22em; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; vertical-align: 0.7em; color: var(--teal); margin-left: 0.1em; }\n  .p1-hero { display: grid; grid-te ead>\n<body>\n\n\n<div id=\"lang-toggle\">\n  <button data-lang=\"en\" class=\"active\">EN<\u002Fbutton>\n  <button data-lang=\"es\">ES<\u002Fbutton>\n  <button data-lang=\"de\">DE<\u002Fbutton>\n  <button data-lang=\"fr\">FR<\u002Fbutton>\n  <button data-lang=\"pt\">PT<\u002Fbutton>\n<\u002Fdiv>\n\n<div class=\"stack\">\n\n<div class=\"page\">\n  <div class=\"page-chrome-top\"><span class=\"brandmark\" style=\"font-size: 10px;\" data-i18n=\"p01.k01\"><span class=\"glyph\" style=\"width: 16px; height: 16px;\"><\u002Fspan>Product Template<\u002Fspan><span data-i18n=\"p01.k02\">Sales Slick · v2.1 · Page 1 of 3<\u002Fspan><\u002Fdiv>\n  <div class=\"page-body\">\n    <div class=\"p1-hero\">\n      <div>\n        <div class=\"p-eyebrow\" data-i18n=\"p01.k03\">Directory Listings · OneList Plus<\u002Fdiv>\n        <h1 class=\"p-hero\" style=\"margin-top: 12px;\" data-i18n=\"p01.k04\" data-html=\"true\">Get found <em>everywhere<\u002Fem> customers search.<\u002Fh1>\n        <p class=\"p\" style=\"margin-top: 14px; max-width: 540px; font-size: 14px;\" data-i18n=\"p01.k05\">One-time submission to up to 40+ directories. Listings locked. Daily monitoring. Consistent NAP across the web — the foundation of local SEO and discovery.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"imgwrap\"><img src=\"4b6369a0-902e-4aee-bacc-3c38569b6061\" alt=\"Directory listings dashboard\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"rule\" style=\"margin: 18px 0 0;\"><\u002Fdiv>\n\n    <div style=\"margin-top: 18px;\">\n      <div class=\"p-eyebrow\" data-i18n=\"p01.k06\">Why local search matters<\u002Fdiv>\n      <div class=\"p1-stats\">\n        <div class=\"p1-stat-card\"><div class=\"p-stat\" data-i18n=\"p01.k07\" data-html=\"true\">97<span class=\"u\">%<\u002Fspan><\u002Fdiv><p class=\"p-sm\" style=\"margin-top: 10px;\" data-i18n=\"p01.k08\">Of users searched online to find a local business.<\u002Fp><\u002Fdiv>\n        <div class=\"p1-stat-card\"><div class=\"p-stat\" data-i18n=\"p01.k09\" data-html=\"true\">86<span class=\"u\">%<\u002Fspan><\u002Fdiv><p class=\"p-sm\" style=\"margin-top: 10px;\" data-i18n=\"p01.k10\">Search business locations on Google Maps.<\u002Fp><\u002Fdiv>\n        <div class=\"p1-stat-card\"><div class=\"p-stat\" data-i18n=\"p01.k11\" data-html=\"true\">64<span class=\"u\">%<\u002Fspan><\u002Fdiv><p class=\"p-sm\" style=\"margin-top: 10px;\" data-i18n=\"p01.k12\">Use Google Business Profile for contact details.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 18px;\">\n      <div class=\"p-eyebrow\" data-i18n=\"p01.k13\">Four reasons to list everywhere<\u002Fdiv>\n      <div class=\"p1-values\">\n        <div class=\"v\"><div class=\"ico\"><\u002Fdiv><h4 class=\"p-card\" data-i18n=\"p01.k14\">Get found<\u002Fh4><p class=\"p-sm\" style=\"margin-top: 6px;\" data-i18n=\"p01.k15\">40+ directories where customers actually search.<\u002Fp><\u002Fdiv>\n        <div class=\"v alt\"><div class=\"ico\"><\u002Fdiv><h4 class=\"p-card\" data-i18n=\"p01.k16\">Save time<\u002Fh4><p class=\"p-sm\" style=\"margin-top: 6px;\" data-i18n=\"p01.k17\">Submit once. No tracking 40 logins.<\u002Fp><\u002Fdiv>\n        <div class=\"v\"><div class=\"ico\"><\u002Fdiv><h4 class=\"p-card\" data-i18n=\"p01.k18\">Better SEO<\u002Fh4><p class=\"p-sm\" style=\"margin-top: 6px;\" data-i18n=\"p01.k19\">Consistent NAP builds search authority.<\u002Fp><\u002Fdiv>\n        <div class=\"v alt\"><div class=\"ico\"><\u002Fdiv><h4 class=\"p-card\" data-i18n=\"p01.k20\">Locked listings<\u002Fh4><p class=\"p-sm\" style=\"margin-top: 6px;\" data-i18n=\"p01.k21\">Daily scans auto-correct drift.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 18px;\">\n      <div class=\"p-eyebrow\" data-i18n=\"p01.k22\">Every plan includes<\u002Fdiv>\n      <div class=\"feat-strip\" style=\"margin-top: 10px;\">\n        <div class=\"feat-card\"><div class=\"ftit\" data-i18n=\"p01.k23\">01 — Submit<\u002Fdiv><div class=\"fname\" data-i18n=\"p01.k24\">One-time entry<\u002Fdiv><div class=\"fdesc\" data-i18n=\"p01.k25\">Submit business info once; propagates to all directories.<\u002Fdiv><\u002Fdiv>\n        <div class=\"feat-card cream\"><div class=\"ftit\" data-i18n=\"p01.k26\">02 — Lock<\u002Fdiv><div class=\"fname\" data-i18n=\"p01.k27\">Daily monitoring<\u002Fdiv><div class=\"fdesc\" data-i18n=\"p01.k28\">Scan + auto-correct against drift, every day.<\u002Fdiv><\u002Fdiv>\n        <div class=\"feat-card\"><div class=\"ftit\" data-i18n=\"p01.k29\">03 — NAP<\u002Fdiv><div class=\"fname\" data-i18n=\"p01.k30\">Consistency<\u002Fdiv><div class=\"fdesc\" data-i18n=\"p01.k31\">Name, address, phone identical everywhere.<\u002Fdiv><\u002Fdiv>\n        <div class=\"feat-card cream\"><div class=\"ftit\" data-i18n=\"p01.k32\">04 — Rich<\u002Fdiv><div class=\"fname\" data-i18n=\"p01.k33\">Enhanced data<\u002Fdiv><div class=\"fdesc\" data-i18n=\"p01.k34\">Keywords, photos, social, descriptions.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex: 1;\"><\u002Fdiv>\n    <div class=\"p1-cta\" style=\"flex-direction: column; align-items: flex-start; gap: 8px;\">\n      <strong style=\"font-size: 20px;\" data-i18n=\"cta.title\">Get Started<\u002Fstrong>\n      <div class=\"p-label\" style=\"color: var(--cream); text-transform: none; letter-spacing: 0; font-size: 12px; line-height: 1.5;\" data-i18n=\"cta.contactfull\" data-html=\"true\">Have questions, want to schedule a demo, or explore how these solutions can support your sales teams today? Contact us at <a href=\"mailto:marketing@hostopia.com\" style=\"color: var(--paper); text-decoration: underline;\">marketing@hostopia.com<\u002Fa> to learn more and connect with one of our experts.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"page-chrome-bot\"><span data-i18n=\"p01.k37\">Customer-facing · for leave-behind use<\u002Fspan><span data-i18n=\"p01.k38\">Page 1 / 3<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\">\n  <div class=\"page-chrome-top\"><span class=\"brandmark\" style=\"font-size: 10px;\" data-i18n=\"p02.k01\"><span class=\"glyph\" style=\"width: 16px; height: 16px;\"><\u002Fspan>Product Template<\u002Fspan><span data-i18n=\"p02.k02\">Sales Slick · v2.1 · Page 2 of 3<\u002Fspan><\u002Fdiv>\n  <div class=\"page-body\">\n    <div>\n      <div class=\"p-eyebrow\" data-i18n=\"p02.k03\">How it works<\u002Fdiv>\n      <h2 class=\"p-sect\" style=\"margin-top: 10px;\" data-i18n=\"p02.k04\">From signup to live listings in 24 hours.<\u002Fh2>\n      <p class=\"p\" style=\"margin-top: 8px; max-width: 540px;\" data-i18n=\"p02.k05\">No logging into 40 directories. No tracking 40 passwords. No manual updates. Submit once; it stays correct.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"p2-steps\" style=\"margin-top: 18px;\">\n      <div class=\"step\"><div class=\"num\" data-i18n=\"p02.k06\">01 — Enter<\u002Fdiv><h3 data-i18n=\"p02.k07\">Business profile<\u002Fh3><p data-i18n=\"p02.k08\">Name, address, phone, hours, categories.<\u002Fp><\u002Fdiv>\n      <div class=\"step\"><div class=\"num\" data-i18n=\"p02.k09\">02 — Enhance<\u002Fdiv><h3 data-i18n=\"p02.k10\">Rich data<\u002Fh3><p data-i18n=\"p02.k11\">Keywords, descriptions, logo, photos, social.<\u002Fp><\u002Fdiv>\n      <div class=\"step\"><div class=\"num\" data-i18n=\"p02.k12\">03 — Submit<\u002Fdiv><h3 data-i18n=\"p02.k13\">Push to directories<\u002Fh3><p data-i18n=\"p02.k14\">One click. 9 or 40+ directories synced.<\u002Fp><\u002Fdiv>\n      <div class=\"step\"><div class=\"num\" data-i18n=\"p02.k15\">04 — Lock<\u002Fdiv><h3 data-i18n=\"p02.k16\">Daily scans<\u002Fh3><p data-i18n=\"p02.k17\">Drift detected = drift auto-corrected.<\u002Fp><\u002Fdiv>\n      <div class=\"step\"><div class=\"num\" data-i18n=\"p02.k18\">05 — Update<\u002Fdiv><h3 data-i18n=\"p02.k19\">Sync everywhere<\u002Fh3><p data-i18n=\"p02.k20\">Change once; pushed to all.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"rule\" style=\"margin: 22px 0 14px;\"><\u002Fdiv>\n\n    <div>\n      <div style=\"display: flex; gap: 24px; justify-content: space-between; align-items: baseline;\">\n        <div>\n          <div class=\"p-eyebrow\" data-i18n=\"p02.k21\">Plans<\u002Fdiv>\n          <h2 class=\"p-sect\" style=\"margin-top: 10px;\" data-i18n=\"p02.k22\">Two tiers. One workflow.<\u002Fh2>\n        <\u002Fdiv>\n        <p class=\"p-sm\" style=\"max-width: 280px; text-align: right;\" data-i18n=\"p02.k23\">Every plan includes one-time submission, listing lock, daily monitoring, NAP consistency, and rich data.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"p2-tiers\">\n        <div class=\"tier\">\n          <div class=\"tlabel\" data-i18n=\"p02.k24\">OneList<\u002Fdiv>\n          <div class=\"tname\" data-i18n=\"p02.k25\">9 directories<\u002Fdiv>\n          <div class=\"ttag\" data-i18n=\"p02.k26\">Essentials. The big 9.<\u002Fdiv>\n          <ul>\n            <li data-i18n=\"p02.k27\">Google, Yelp, Apple Maps<\u002Fli>\n            <li data-i18n=\"p02.k28\">Bing Places, Facebook, Yellow Pages<\u002Fli>\n            <li data-i18n=\"p02.k29\">Daily monitoring + listing lock<\u002Fli>\n            <li data-i18n=\"p02.k30\">NAP consistency<\u002Fli>\n            <li data-i18n=\"p02.k31\">Rich data where supported<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"tier featured\">\n          <div class=\"tlabel\" style=\"color: var(--cream);\" data-i18n=\"p02.k32\">OneList Plus ★<\u002Fdiv>\n          <div class=\"tname\" data-i18n=\"p02.k33\">40+ directories<\u002Fdiv>\n          <div class=\"ttag\" data-i18n=\"p02.k34\">For serious local SEO.<\u002Fdiv>\n          <ul>\n            <li data-i18n=\"p02.k35\">Everything in OneList<\u002Fli>\n            <li data-i18n=\"p02.k36\">40+ relevant directories<\u002Fli>\n            <li data-i18n=\"p02.k37\">Industry-specific directories<\u002Fli>\n            <li data-i18n=\"p02.k38\">GPS systems included<\u002Fli>\n            <li data-i18n=\"p02.k39\">Priority support<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: auto; padding: 16px 18px; background: var(--paper-2); border: 1px solid var(--paper-3); display: flex; gap: 18px; align-items: center;\">\n      <div class=\"p-label\" style=\"color: var(--teal);\" data-i18n=\"p02.k40\">Promise<\u002Fdiv>\n      <p class=\"p-sm\" style=\"margin: 0;\" data-i18n=\"p02.k41\">Search engines verify business legitimacy by cross-checking 40+ citations. OneList Plus puts the business on the directories that matter — and keeps them locked.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"page-chrome-bot\"><span data-i18n=\"p02.k42\">Customer-facing · process and plans<\u002Fspan><span data-i18n=\"p02.k43\">Page 2 / 3<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\">\n  <div class=\"page-chrome-top\"><span class=\"brandmark\" style=\"font-size: 10px;\" data-i18n=\"p03.k01\"><span class=\"glyph\" style=\"width: 16px; height: 16px;\"><\u002Fspan>Product Template<\u002Fspan><span data-i18n=\"p03.k02\">Sales Playbook · v2.1 · Page 3 of 3<\u002Fspan><\u002Fdiv>\n  <div class=\"page-body\">\n    <div>\n      <div class=\"p-eyebrow\" data-i18n=\"p03.k03\">Sales playbook<\u002Fdiv>\n      <h2 class=\"p-sect\" style=\"margin-top: 10px;\" data-i18n=\"p03.k04\">How to sell Directory Listings.<\u002Fh2>\n      <p class=\"p\" style=\"margin-top: 8px; max-width: 540px;\" data-i18n=\"p03.k05\">Rep-facing reference. ICP, discovery, objection handling, competitive — all on one page.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"p3-grid\" style=\"margin-top: 24px;\">\n      <div>\n        <div>\n          <div class=\"p-label\" style=\"color: var(--teal);\" data-i18n=\"p03.k06\">Ideal customer profile<\u002Fdiv>\n          <div class=\"p3-icp\" style=\"margin-top: 8px;\">\n            <div class=\"row-icp\"><div class=\"n\">01<\u002Fdiv><p data-i18n=\"p03.k07\" data-html=\"true\"><strong>Local-service SMBs.<\u002Fstrong> Restaurants, contractors, salons, dentists — businesses with foot traffic or local-search dependence.<\u002Fp><\u002Fdiv>\n            <div class=\"row-icp\"><div class=\"n\">02<\u002Fdiv><p data-i18n=\"p03.k08\" data-html=\"true\"><strong>Multi-location SMBs.<\u002Fstrong> Consistency challenges scale linearly with locations.<\u002Fp><\u002Fdiv>\n            <div class=\"row-icp\"><div class=\"n\">03<\u002Fdiv><p data-i18n=\"p03.k09\" data-html=\"true\"><strong>Customers with website + hosting.<\u002Fstrong> Easy attach — same dashboard, same bill.<\u002Fp><\u002Fdiv>\n            <div class=\"row-icp\"><div class=\"n\">04<\u002Fdiv><p data-i18n=\"p03.k10\" data-html=\"true\"><strong>Just-rebranded businesses.<\u002Fstrong> Name, phone, or address changes mean 40+ updates if done manually.<\u002Fp><\u002Fdiv>\n            <div class=\"row-icp\"><div class=\"n\">05<\u002Fdiv><p data-i18n=\"p03.k11\" data-html=\"true\"><strong>SEO-conscious owners.<\u002Fstrong> Anyone who's heard \"citations matter\" and doesn't know how to operationalize.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top: 22px;\">\n          <div class=\"p-label\" style=\"color: var(--teal);\" data-i18n=\"p03.k12\">Discovery questions<\u002Fdiv>\n          <div style=\"margin-top: 8px;\">\n            <div class=\"p3-q\"><div class=\"n\" data-i18n=\"p03.k13\">Q.01<\u002Fdiv><p data-i18n=\"p03.k14\">Is your business on Google Business Profile?<\u002Fp><\u002Fdiv>\n            <div class=\"p3-q\"><div class=\"n\" data-i18n=\"p03.k15\">Q.02<\u002Fdiv><p data-i18n=\"p03.k16\">Is your address and phone identical across Google, Yelp, and Yellow Pages?<\u002Fp><\u002Fdiv>\n            <div class=\"p3-q\"><div class=\"n\" data-i18n=\"p03.k17\">Q.03<\u002Fdiv><p data-i18n=\"p03.k18\">When did you last update business hours across directories?<\u002Fp><\u002Fdiv>\n            <div class=\"p3-q\"><div class=\"n\" data-i18n=\"p03.k19\">Q.04<\u002Fdiv><p data-i18n=\"p03.k20\">How are you ranking for local searches today?<\u002Fp><\u002Fdiv>\n            <div class=\"p3-q\"><div class=\"n\" data-i18n=\"p03.k21\">Q.05<\u002Fdiv><p data-i18n=\"p03.k22\">If your phone changed tomorrow, how would you update all listings?<\u002Fp><\u002Fdiv>\n            <div class=\"p3-q\"><div class=\"n\" data-i18n=\"p03.k23\">Q.06<\u002Fdiv><p data-i18n=\"p03.k24\">Do you know the 40+ directories search engines check?<\u002Fp><\u002Fdiv>\n            <div class=\"p3-q\"><div class=\"n\" data-i18n=\"p03.k25\">Q.07<\u002Fdiv><p data-i18n=\"p03.k26\">If a single dashboard controlled all of them, would that change things?<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div>\n          <div class=\"p-label\" style=\"color: var(--teal);\" data-i18n=\"p03.k27\">Objection handling<\u002Fdiv>\n          <div style=\"margin-top: 8px;\">\n            <div class=\"p3-obj\"><q data-i18n=\"p03.k28\">I'm already on Google.<\u002Fq><p data-i18n=\"p03.k29\">That's one of 40+. Search engines verify legitimacy by cross-referencing citations. Inconsistent or missing listings tank local rankings.<\u002Fp><\u002Fdiv>\n            <div class=\"p3-obj\"><q data-i18n=\"p03.k30\">I'll do it myself.<\u002Fq><p data-i18n=\"p03.k31\">How long did Google take? Multiply by 40, plus 40 logins, monitoring, manual updates every change. OneList Plus collapses all of it.<\u002Fp><\u002Fdiv>\n            <div class=\"p3-obj\"><q data-i18n=\"p03.k32\">Aren't directories dead?<\u002Fq><p data-i18n=\"p03.k33\">Citations remain a core SEO ranking signal. GBP, Apple Maps, Yelp, and industry directories drive 64–86% of local discovery.<\u002Fp><\u002Fdiv>\n            <div class=\"p3-obj\"><q data-i18n=\"p03.k34\">Customers know where I am.<\u002Fq><p data-i18n=\"p03.k35\">Existing customers, sure. New ones — 97% of whom search online — find the business that ranks first. Citations are how Google decides.<\u002Fp><\u002Fdiv>\n            <div class=\"p3-obj\"><q data-i18n=\"p03.k36\">I tried Yext / Synup.<\u002Fq><p data-i18n=\"p03.k37\">Same NAP-sync core at SMB pricing — premium suites cost 5–10x more. Bundled with website / hosting; one bill, one platform.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top: 22px;\">\n          <div class=\"p-label\" style=\"color: var(--teal);\" data-i18n=\"p03.k38\">Competitive snapshot<\u002Fdiv>\n          <div style=\"margin-top: 8px;\">\n            <div class=\"p3-obj\"><q style=\"font-style: normal;\" data-i18n=\"p03.k39\">vs. Yext / Synup<\u002Fq><p data-i18n=\"p03.k40\">Same NAP-sync core. SMB pricing. Bundled with website + hosting.<\u002Fp><\u002Fdiv>\n            <div class=\"p3-obj\"><q style=\"font-style: normal;\" data-i18n=\"p03.k41\">vs. Manual submission<\u002Fq><p data-i18n=\"p03.k42\">40 directories × 30 min = workweek. We collapse to one form.<\u002Fp><\u002Fdiv>\n            <div class=\"p3-obj\"><q style=\"font-style: normal;\" data-i18n=\"p03.k43\">vs. GBP only<\u002Fq><p data-i18n=\"p03.k44\">One directory of 40+. Thin authority signal alone.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top: auto; padding: 14px 16px; background: var(--ink); color: var(--paper); display: flex; gap: 12px; align-items: center;\">\n          <div style=\"font-family: var(--serif); font-size: 28px; font-weight: 380; color: var(--paper);\" data-i18n=\"p03.k45\" data-html=\"true\">40<span style=\"font-size: 0.4em;\">+<\u002Fspan><\u002Fdiv>\n          <div><div class=\"p-label\" style=\"color: var(--cream);\" data-i18n=\"p03.k46\">Directories from one dashboard<\u002Fdiv><div style=\"font-family: var(--serif); font-size: 13px; color: var(--paper); margin-top: 2px;\" data-i18n=\"p03.k47\">Submit once, monitored daily, locked.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"page-chrome-bot\"><span data-i18n=\"p03.k48\">Rep-facing · all specs from OneList Plus catalog<\u002Fspan><span data-i18n=\"p03.k49\">Page 3 / 3<\u002Fspan>\n    <div style=\"flex:1;\"><\u002Fdiv>\n    <div class=\"p1-cta\" style=\"flex-direction: column; align-items: flex-start; gap: 8px;\">\n      <strong style=\"font-size: 20px;\" data-i18n=\"cta.title\">Get Started<\u002Fstrong>\n      <div class=\"p-label\" style=\"color: var(--cream); text-transform: none; letter-spacing: 0; font-size: 12px; line-height: 1.5;\" data-i18n=\"cta.contactfull\" data-html=\"true\">Have questions, want to schedule a demo, or explore how these solutions can support your sales teams today? Contact us at <a href=\"mailto:marketing@hostopia.com\" style=\"color: var(--paper); text-decoration: underline;\">marketing@hostopia.com<\u002Fa> to learn more and connect with one of our experts.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>const LANG = window.LANG = {};<\u002Fscript>\n<script src=\"303615b8-5a07-49ca-a0ea-b02a9252369c\"><\u002Fscript>\n<script>\nfunction applyLang(l){const d=LANG[l];if(!d)return;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(d[k]===undefined)return;if(el.hasAttribute('data-html'))el.innerHTML=d[k];else el.textContent=d[k];});document.documentElement.lang=l;document.querySelectorAll('#lang-toggle button').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));try{localStorage.setItem('dirSlickLang',l);}catch(e){}}\nwindow.applyLang=applyLang;\ndocument.querySelectorAll('#lang-toggle button').forEach(b=>b.addEventListener('click',()=>applyLang(b.dataset.lang)));\nconst s=(()=>{try{return localStorage.getItem('dirSlickLang');}catch(e){return null;}})();\nif(s&&LANG[s])applyLang(s);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
