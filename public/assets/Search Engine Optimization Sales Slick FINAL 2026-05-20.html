  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"903803b2-663a-48e2-b176-a85893db3d80\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"f921c356-8484-48be-9c1d-9dc2eaeff84d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ---------- Design system tokens ---------- */\n:root {\n  /* Color */\n  --ink: #1A1F2B;\n  --ink-2: #3A4150;\n  --ink-3: #6B7280;\n  --rule: #D9D6CF;\n  --rule-2: #E8E5DD;\n  --paper: #FAF7F0;\n  --paper-2: #F5EFE3;\n  --paper-3: #EFE8D8;\n  --white: #FFFFFF;\n\n  --teal: #0F6E6E;\n  --teal-deep: #0A4F4F;\n  --teal-pale: #E0EBEA;\n  --teal-tint: #F1F6F5;\n\n  --cream: #F5EFE3;\n  --accent-warm: #C2895A;   /* sparingly */\n  --accent-warm-pale: #F0DFC8;\n\n  /* Type */\n  --serif: \"Newsreader\", \"Source Serif Pro\", Georgia, serif;\n  --sans: \"Geist\", \"Inter Tight\", system-ui, -apple-system, sans-serif;\n  --mono: \"Geist Mono\", \"JetBrains Mono\", ui-monospace, monospace;\n\n  /* Misc */\n  --maxw: 1280px;\n}\n\n/* Reset-ish */\n*, *::before, *::after { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  font-family: var(--sans);\n  color: var(--ink);\n  background: var(--paper);\n  font-feature-settings: \"ss01\", \"cv11\";\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---------- Typography ---------- */\n.serif { font-family: var(--serif); }\n.sans { font-family: var(--sans); }\n.mono { font-family: var(--mono); }\n\n.eyebrow {\n  font-family: var(--mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--teal);\n}\n\n.label {\n  font-family: var(--mono);\n  font-size: 10.5px;\n  font-weight: 500;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--serif);\n  font-weight: 400;\n  letter-spacing: -0.01em;\n  margin: 0;\n  text-wrap: balance;\n  color: var(--ink);\n}\nh1 { font-size: 72px; line-height: 0.98; font-weight: 380; }\nh2 { font-size: 44px; line-height: 1.05; }\nh3 { font-size: 26px; line-height: 1.15; }\nh4 { font-size: 18px; line-height: 1.2; font-family: var(--sans); font-weight: 600; }\n\np { margin: 0; font-size: 15.5px; line-height: 1.55; color: var(--ink-2); }\np.lede { font-size: 19px; line-height: 1.5; color: var(--ink); text-wrap: pretty; }\n\n/* ---------- Reusable components ---------- */\n\n/* Big stat */\n.bigstat {\n  font-family: var(--serif);\n  font-weight: 380;\n  font-size: 120px;\n  line-height: 0.92;\n  letter-spacing: -0.025em;\n  color: var(--ink);\n  font-feature-settings: \"lnum\", \"tnum\";\n}\n.bigstat .unit {\n  font-family: var(--sans);\n  font-size: 0.28em;\n  font-weight: 500;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  vertical-align: 0.45em;\n  color: var(--teal);\n  margin-left: 0.08em;\n}\n\n/* Rules */\n.rule { height: 1px; background: var(--rule); width: 100%; }\n.rule-ink { height: 1px; background: var(--ink); width: 100%; }\n.rule-teal { height: 2px; background: var(--teal); width: 48px; }\n\n/* Square accents - picking up DNA from the original */\n.squares {\n  display: inline-grid;\n  grid-template-columns: 12px 12px;\n  grid-template-rows: 12px 12px;\n  gap: 3px;\n}\n.squares span { background: var(--teal); display: block; }\n.squares span:nth-child(2) { background: var(--cream); }\n.squares span:nth-child(3) { background: var(--accent-warm); }\n.squares span:nth-child(4) { background: var(--ink); }\n\n/* Image slot — drop-in placeholder */\n.imgslot {\n  position: relative;\n  background:\n    repeating-linear-gradient(135deg,\n      var(--paper-3) 0 1px,\n      transparent 1px 12px),\n    var(--paper-2);\n  border: 1px solid var(--rule);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  text-align: center;\n  color: var(--ink-3);\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n}\n.imgslot::before {\n  content: \"\";\n  position: absolute;\n  inset: 10px;\n  border: 1px dashed var(--rule);\n  pointer-events: none;\n}\n.imgslot > span {\n  position: relative;\n  background: var(--paper);\n  padding: 6px 10px;\n  border: 1px solid var(--rule);\n}\n.imgslot.dark {\n  background:\n    repeating-linear-gradient(135deg,\n      rgba(255,255,255,0.04) 0 1px,\n      transparent 1px 12px),\n    var(--teal-deep);\n  border-color: var(--teal-deep);\n  color: rgba(255,255,255,0.7);\n}\n.imgslot.dark > span { background: var(--teal-deep); border-color: rgba(255,255,255,0.2); }\n\n/* Badge / pill */\n.pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--ink);\n  padding: 5px 10px;\n  border: 1px solid var(--ink);\n  border-radius: 999px;\n  background: transparent;\n}\n.pill.solid { background: var(--ink); color: var(--paper); }\n.pill.teal { border-color: var(--teal); color: var(--teal); }\n.pill.teal.solid { background: var(--teal); color: var(--paper); }\n.pill .dot {\n  width: 6px; height: 6px; background: currentColor; border-radius: 50%;\n}\n\n/* Number marker (01, 02...) */\n.num {\n  font-family: var(--mono);\n  font-size: 12px;\n  font-weight: 500;\n  letter-spacing: 0.1em;\n  color: var(--teal);\n}\n.num.lg {\n  font-family: var(--serif);\n  font-size: 56px;\n  font-weight: 380;\n  line-height: 1;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n}\n\n/* Card */\n.card {\n  background: var(--white);\n  border: 1px solid var(--rule);\n  padding: 28px;\n}\n.card.cream { background: var(--paper-2); border-color: var(--paper-3); }\n.card.ink { background: var(--ink); color: var(--paper); border-color: var(--ink); }\n.card.teal { background: var(--teal); color: var(--paper); border-color: var(--teal); }\n\n/* Layout helpers */\n.flex { display: flex; }\n.col { display: flex; flex-direction: column; }\n.between { justify-content: space-between; }\n.center { align-items: center; justify-content: center; }\n.gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; }\n.gap-24 { gap: 24px; } .gap-32 { gap: 32px; } .gap-48 { gap: 48px; }\n\n/* Logo showcase — sample-work grids */\n.logocard {\n  background: var(--white);\n  border: 1px solid var(--rule);\n  aspect-ratio: 4/3;\n  display: flex; align-items: center; justify-content: center;\n  padding: 18px;\n  overflow: hidden;\n}\n.logocard img {\n  max-width: 100%;\n  max-height: 100%;\n  object-fit: contain;\n  display: block;\n}\n.logocard.cream { background: var(--paper-2); border-color: var(--paper-3); }\n.logocard.ink { background: var(--ink); border-color: var(--ink); }\n\n.logogrid {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 8px;\n}\n\n/* Brand mark — generic, swappable */\n.brandmark {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--ink);\n}\n.brandmark .glyph {\n  width: 22px; height: 22px;\n  background: var(--teal);\n  position: relative;\n}\n.brandmark .glyph::after {\n  content: \"\";\n  position: absolute;\n  right: -6px; bottom: -6px;\n  width: 12px; height: 12px;\n  background: var(--cream);\n  border: 1px so \"margin-top: 14px;\">\n      <div class=\"p-eyebrow\" data-i18n=\"p01.k07\">Why SEO matters<\u002Fdiv>\n      <div class=\"p1-stats\">\n        <div class=\"p1-stat-card\"><div class=\"p-stat\" data-i18n=\"p01.k08\" data-html=\"true\">75<span class=\"u\">%<\u002Fspan><\u002Fdiv><p class=\"p-sm\" style=\"margin-top: 8px;\" data-i18n=\"p01.k09\">Of users never scroll past page 1 of Google.<\u002Fp><\u002Fdiv>\n        <div class=\"p1-stat-card\"><div class=\"p-stat\" data-i18n=\"p01.k10\" data-html=\"true\">68<span class=\"u\">%<\u002Fspan><\u002Fdiv><p class=\"p-sm\" style=\"margin-top: 8px;\" data-i18n=\"p01.k11\">Of clicks go to the top 3 organic results.<\u002Fp><\u002Fdiv>\n        <div class=\"p1-stat-card\"><div class=\"p-stat\" data-i18n=\"p01.k12\" data-html=\"true\">10<span class=\"u\">× cheaper<\u002Fspan><\u002Fdiv><p class=\"p-sm\" style=\"margin-top: 8px;\" data-i18n=\"p01.k13\">SEO clicks vs. paid ads — and compounds.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 16px;\">\n      <div class=\"p-eyebrow\" data-i18n=\"p01.k14\">Powerful features<\u002Fdiv>\n      <div style=\"margin-top: 8px;\">\n        <div class=\"feat-row\"><div class=\"ftit\" data-i18n=\"p01.k15\" data-html=\"true\"><span class=\"fnum\">01<\u002Fspan>AI-Powered SEO Strategy<\u002Fdiv><p data-i18n=\"p01.k16\">Give users a clear, actionable SEO plan backed by AI — improving rankings without needing an expert.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-row\"><div class=\"ftit\" data-i18n=\"p01.k17\" data-html=\"true\"><span class=\"fnum\">02<\u002Fspan>AI Keyword Discovery &amp; Tracking<\u002Fdiv><p data-i18n=\"p01.k18\">Uncover new keyword opportunities and monitor search performance to keep clients visible where it matters most.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-row\"><div class=\"ftit\" data-i18n=\"p01.k19\" data-html=\"true\"><span class=\"fnum\">03<\u002Fspan>AI Content Creation<\u002Fdiv><p data-i18n=\"p01.k20\">Help users generate SEO-friendly content quickly and consistently — no copywriter required.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-row\"><div class=\"ftit\" data-i18n=\"p01.k21\" data-html=\"true\"><span class=\"fnum\">04<\u002Fspan>Website Optimization<\u002Fdiv><p data-i18n=\"p01.k22\">Turn technical SEO into simple, actionable steps with AI-driven content and structure recommendations.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-row\"><div class=\"ftit\" data-i18n=\"p01.k23\" data-html=\"true\"><span class=\"fnum\">05<\u002Fspan>Performance Tracking &amp; Intelligence<\u002Fdiv><p data-i18n=\"p01.k24\">Complete view of traffic and rankings so customers know what's working — and where to push harder.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex: 1;\"><\u002Fdiv>\n    <div class=\"p1-cta\" style=\"flex-direction: column; align-items: flex-start; gap: 8px;\">\n      <strong style=\"font-size: 20px;\" data-i18n=\"cta.title\">Get Started<\u002Fstrong>\n      <div class=\"p-label\" style=\"color: var(--cream); text-transform: none; letter-spacing: 0; font-size: 12px; line-height: 1.5;\" data-i18n=\"cta.contactfull\" data-html=\"true\">Have questions, want to schedule a demo, or explore how these solutions can support your sales teams today? Contact us at <a href=\"mailto:marketing@hostopia.com\" style=\"color: var(--paper); text-decoration: underline;\">marketing@hostopia.com<\u002Fa> to learn more and connect with one of our experts.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"page-chrome-bot\"><span data-i18n=\"p01.k27\">Customer-facing · for leave-behind use<\u002Fspan><span data-i18n=\"p01.k28\">Page 1 / 3<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\">\n  <div class=\"page-chrome-top\"><span class=\"brandmark\" style=\"font-size: 10px;\" data-i18n=\"p02.k01\"><span class=\"glyph\" style=\"width: 16px; height: 16px;\"><\u002Fspan>Product Template<\u002Fspan><span data-i18n=\"p02.k02\">Sales Slick · v2.1 · Page 2 of 3<\u002Fspan><\u002Fdiv>\n  <div class=\"page-body\">\n    <div>\n      <div class=\"p-eyebrow\" data-i18n=\"p02.k03\">How it works<\u002Fdiv>\n      <h2 class=\"p-sect\" style=\"margin-top: 10px;\" data-i18n=\"p02.k04\">Five steps to rank.<\u002Fh2>\n      <p class=\"p\" style=\"margin-top: 8px; max-width: 540px;\" data-i18n=\"p02.k05\">No SEO expert, no agency, no technical background. Built for the owner who wants to rank without hiring.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"p2-steps\" style=\"margin-top: 18px;\">\n      <div class=\"step\"><div class=\"num\" data-i18n=\"p02.k06\">01 — Connect<\u002Fdiv><h3 data-i18n=\"p02.k07\">Link site<\u002Fh3><p data-i18n=\"p02.k08\">Website + Search Console. AI imports rank + traffic data.<\u002Fp><\u002Fdiv>\n      <div class=\"step\"><div class=\"num\" data-i18n=\"p02.k09\">02 — Audit<\u002Fdiv><h3 data-i18n=\"p02.k10\">AI scans<\u002Fh3><p data-i18n=\"p02.k11\">Technical issues, missing tags, slow pages — all in 5 minutes.<\u002Fp><\u002Fdiv>\n      <div class=\"step\"><div class=\"num\" data-i18n=\"p02.k12\">03 — Plan<\u002Fdiv><h3 data-i18n=\"p02.k13\">SEO strategy<\u002Fh3><p data-i18n=\"p02.k14\">Prioritized roadmap. Quick wins first; compound plays mapped.<\u002Fp><\u002Fdiv>\n      <div class=\"step\"><div class=\"num\" data-i18n=\"p02.k15\">04 — Execute<\u002Fdiv><h3 data-i18n=\"p02.k16\">Optimize<\u002Fh3><p data-i18n=\"p02.k17\">Fix technical issues. Generate AI content for target keywords.<\u002Fp><\u002Fdiv>\n      <div class=\"step\"><div class=\"num\" data-i18n=\"p02.k18\">05 — Track<\u002Fdiv><h3 data-i18n=\"p02.k19\">Monitor<\u002Fh3><p data-i18n=\"p02.k20\">Weekly rank, traffic, competitor moves. AI suggests next priority.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"rule\" style=\"margin: 18px 0 14px;\"><\u002Fdiv>\n\n    <div>\n      <div class=\"p-eyebrow\" data-i18n=\"p02.k21\">Benefits<\u002Fdiv>\n      <h2 class=\"p-sect\" style=\"margin-top: 10px;\" data-i18n=\"p02.k22\">For partners and their customers.<\u002Fh2>\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 14px;\">\n        <div>\n          <div class=\"p-label\" style=\"color: var(--teal);\" data-i18n=\"p02.k23\">Customer benefits<\u002Fdiv>\n          <div class=\"ben-grid\">\n            <div class=\"ben\"><div class=\"dot\"><\u002Fdiv><div><h5 data-i18n=\"p02.k24\">Maximize reach<\u002Fh5><p data-i18n=\"p02.k25\">Visible across Google, social, and content channels.<\u002Fp><\u002Fdiv><\u002Fdiv>\n            <div class=\"ben\"><div class=\"dot\"><\u002Fdiv><div><h5 data-i18n=\"p02.k26\">AI-powered posting<\u002Fh5><p data-i18n=\"p02.k27\">SEO-optimized content generated in seconds.<\u002Fp><\u002Fdiv><\u002Fdiv>\n            <div class=\"ben\"><div class=\"dot\"><\u002Fdiv><div><h5 data-i18n=\"p02.k28\">Campaign control<\u002Fh5><p data-i18n=\"p02.k29\">Full control with AI doing the heavy lifting.<\u002Fp><\u002Fdiv><\u002Fdiv>\n            <div class=\"ben\"><div class=\"dot\"><\u002Fdiv><div><h5 data-i18n=\"p02.k30\">Traffic boosting<\u002Fh5><p data-i18n=\"p02.k31\">Compound organic growth over months.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"p-label\" style=\"color: var(--accent-warm);\" data-i18n=\"p02.k32\">Partner benefits<\u002Fdiv>\n          <div class=\"ben-grid\">\n            <div class=\"ben cream\"><div class=\"dot\"><\u002Fdiv><div><h5 data-i18n=\"p02.k33\">Higher revenue<\u002Fh5><p data-i18n=\"p02.k34\">Advanced advertising commands premium pricing.<\u002Fp><\u002Fdiv><\u002Fdiv>\n            <div class=\"ben cream\"><div class=\"dot\"><\u002Fdiv><div><h5 data-i18n=\"p02.k35\">Strong retention<\u002Fh5><p data-i18n=\"p02.k36\">Active campaigns build sticky engagement.<\u002Fp><\u002Fdiv><\u002Fdiv>\n            <div class=\"ben cream\"><div class=\"dot\"><\u002Fdiv><div><h5 data-i18n=\"p02.k37\">Full-service<\u002Fh5><p data-i18n=\"p02.k38\">Complete digital marketing capability in one stack.<\u002Fp><\u002Fdiv><\u002Fdiv>\n            <div class=\"ben cream\"><div class=\"dot\"><\u002Fdiv><div><h5 data-i18n=\"p02.k39\">Clear value prop<\u002Fh5><p data-i18n=\"p02.k40\">For growing businesses ready to scale visibility.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex: 1;\"><\u002Fdiv>\n\n    <div>\n      <div class=\"p-eyebrow\" data-i18n=\"p02.k41\">Where it fits<\u002Fdiv>\n      <h2 class=\"p-sect\" style=\"margin-top: 10px;\" data-i18n=\"p02.k42\">OMC Boost — the visibility tier.<\u002Fh2>\n      <div class=\"p2-tiers\" style=\"margin-top: 12px;\">\n        <div class=\"tier\">\n          <div class=\"tlabel\" data-i18n=\"p02.k43\">OMC Trust<\u002Fdiv>\n          <div class=\"tname\" data-i18n=\"p02.k44\">Reputation<\u002Fdiv>\n          <div class=\"ttag\" data-i18n=\"p02.k45\">Step below.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tier featured\">\n          <div class=\"tlabel\" style=\"color: var(--cream);\" data-i18n=\"p02.k46\">OMC Boost ★<\u002Fdiv>\n          <div class=\"tname\" data-i18n=\"p02.k47\">SEO + visibility<\u002Fdiv>\n          <div class=\"ttag\" data-i18n=\"p02.k48\">This product. Traffic tier.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tier cream\">\n          <div class=\"tlabel\" style=\"color: var(--accent-warm);\" data-i18n=\"p02.k49\">OMC Pro<\u002Fdiv>\n          <div class=\"tname\" data-i18n=\"p02.k50\">+ Paid ads<\u002Fdiv>\n          <div class=\"ttag\" data-i18n=\"p02.k51\">Full marketing stack.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"page-chrome-bot\"><span data-i18n=\"p02.k52\">Customer-facing · process and OMC ladder<\u002Fspan><span data-i18n=\"p02.k53\">Page 2 / 3<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\">\n  <div class=\"page-chrome-top\"><span class=\"brandmark\" style=\"font-size: 10px;\" data-i18n=\"p03.k01\"><span class=\"glyph\" style=\"width: 16px; height: 16px;\"><\u002Fspan>Product Template<\u002Fspan><span data-i18n=\"p03.k02\">Sales Playbook · v2.1 · Page 3 of 3<\u002Fspan><\u002Fdiv>\n  <div class=\"page-body\">\n    <div>\n      <div class=\"p-eyebrow\" data-i18n=\"p03.k03\">Sales playbook<\u002Fdiv>\n      <h2 class=\"p-sect\" style=\"margin-top: 10px;\" data-i18n=\"p03.k04\">How to sell SEO.<\u002Fh2>\n      <p class=\"p\" style=\"margin-top: 8px; max-width: 540px;\" data-i18n=\"p03.k05\">Rep-facing reference. ICP, discovery, objection handling, competitive — all on one page.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"p3-grid\" style=\"margin-top: 24px;\">\n      <div>\n        <div>\n          <div class=\"p-label\" style=\"color: var(--teal);\" data-i18n=\"p03.k06\">Ideal customer profile<\u002Fdiv>\n          <div class=\"p3-icp\" style=\"margin-top: 8px;\">\n            <div class=\"row-icp\"><div class=\"n\">01<\u002Fdiv><p data-i18n=\"p03.k07\" data-html=\"true\"><strong>Growth-stage SMBs.<\u002Fstrong> Already running ads; want sustainable traffic.<\u002Fp><\u002Fdiv>\n            <div class=\"row-icp\"><div class=\"n\">02<\u002Fdiv><p data-i18n=\"p03.k08\" data-html=\"true\"><strong>Local services.<\u002Fstrong> Compete in search-driven categories — contractors, restaurants, healthcare.<\u002Fp><\u002Fdiv>\n            <div class=\"row-icp\"><div class=\"n\">03<\u002Fdiv><p data-i18n=\"p03.k09\" data-html=\"true\"><strong>E-commerce sellers.<\u002Fstrong> Need organic product page rankings to reduce ad spend.<\u002Fp><\u002Fdiv>\n            <div class=\"row-icp\"><div class=\"n\">04<\u002Fdiv><p data-i18n=\"p03.k10\" data-html=\"true\"><strong>OMC Trust upgraders.<\u002Fstrong> Natural ladder step to the visibility tier.<\u002Fp><\u002Fdiv>\n            <div class=\"row-icp\"><div class=\"n\">05<\u002Fdiv><p data-i18n=\"p03.k11\" data-html=\"true\"><strong>Ex-agency customers.<\u002Fstrong> Tired of paying $2K+/mo without transparency.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top: 22px;\">\n          <div class=\"p-label\" style=\"color: var(--teal);\" data-i18n=\"p03.k12\">Discovery questions<\u002Fdiv>\n          <div style=\"margin-top: 8px;\">\n            <div class=\"p3-q\"><div class=\"n\" data-i18n=\"p03.k13\">Q.01<\u002Fdiv><p data-i18n=\"p03.k14\">When customers Google your service in your city, what page does your site appear on?<\u002Fp><\u002Fdiv>\n            <div class=\"p3-q\"><div class=\"n\" data-i18n=\"p03.k15\">Q.02<\u002Fdiv><p data-i18n=\"p03.k16\">What are the top 3 keywords you'd want to rank for?<\u002Fp><\u002Fdiv>\n            <div class=\"p3-q\"><div class=\"n\" data-i18n=\"p03.k17\">Q.03<\u002Fdiv><p data-i18n=\"p03.k18\">How much are you spending on Google Ads each month?<\u002Fp><\u002Fdiv>\n            <div class=\"p3-q\"><div class=\"n\" data-i18n=\"p03.k19\">Q.04<\u002Fdiv><p data-i18n=\"p03.k20\">Who writes content on your site — you, an agency, ChatGPT?<\u002Fp><\u002Fdiv>\n            <div class=\"p3-q\"><div class=\"n\" data-i18n=\"p03.k21\">Q.05<\u002Fdiv><p data-i18n=\"p03.k22\">Do you know your site's page speed or technical SEO health?<\u002Fp><\u002Fdiv>\n            <div class=\"p3-q\"><div class=\"n\" data-i18n=\"p03.k23\">Q.06<\u002Fdiv><p data-i18n=\"p03.k24\">How do you track which keywords drive customers to your site?<\u002Fp><\u002Fdiv>\n            <div class=\"p3-q\"><div class=\"n\" data-i18n=\"p03.k25\">Q.07<\u002Fdiv><p data-i18n=\"p03.k26\">If AI surfaced 50 keywords competitors rank for but you don't, would that change things?<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div>\n          <div class=\"p-label\" style=\"color: var(--teal);\" data-i18n=\"p03.k27\">Objection handling<\u002Fdiv>\n          <div style=\"margin-top: 8px;\">\n            <div class=\"p3-obj\"><q data-i18n=\"p03.k28\">SEO takes too long.<\u002Fq><p data-i18n=\"p03.k29\">Long-tail wins in 4–8 weeks. AI prioritizes quick wins. Most customers see traffic lift within 60–90 days.<\u002Fp><\u002Fdiv>\n            <div class=\"p3-obj\"><q data-i18n=\"p03.k30\">I use Google Ads already.<\u002Fq><p data-i18n=\"p03.k31\">Ads stop when you stop paying. SEO compounds — once you rank, clicks are free. Smart marketers run both.<\u002Fp><\u002Fdiv>\n            <div class=\"p3-obj\"><q data-i18n=\"p03.k32\">I don't know what to write.<\u002Fq><p data-i18n=\"p03.k33\">AI does. Keyword discovery surfaces topics; AI content writes the posts. You review and publish.<\u002Fp><\u002Fdiv>\n            <div class=\"p3-obj\"><q data-i18n=\"p03.k34\">My site is fine technically.<\u002Fq><p data-i18n=\"p03.k35\">Maybe. AI audit takes 5 minutes. Most SMBs find 20+ issues they didn't know about.<\u002Fp><\u002Fdiv>\n            <div class=\"p3-obj\"><q data-i18n=\"p03.k36\">I should hire an agency.<\u002Fq><p data-i18n=\"p03.k37\">Agencies cost $1.5K–$5K/mo. AI does the same analysis instantly, runs 24/7, owner-controlled.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top: 22px;\">\n          <div class=\"p-label\" style=\"color: var(--teal);\" data-i18n=\"p03.k38\">Competitive snapshot<\u002Fdiv>\n          <div style=\"margin-top: 8px;\">\n            <div class=\"p3-obj\"><q style=\"font-style: normal;\" data-i18n=\"p03.k39\">vs. SEMrush / Ahrefs<\u002Fq><p data-i18n=\"p03.k40\">$129–$449+/mo for SEO pros. We target SMB owners — AI does the work.<\u002Fp><\u002Fdiv>\n            <div class=\"p3-obj\"><q style=\"font-style: normal;\" data-i18n=\"p03.k41\">vs. Moz Pro<\u002Fq><p data-i18n=\"p03.k42\">$99+/mo, no content generation. We bundle research + content + audit + tracking.<\u002Fp><\u002Fdiv>\n            <div class=\"p3-obj\"><q style=\"font-style: normal;\" data-i18n=\"p03.k43\">vs. SEO agency<\u002Fq><p data-i18n=\"p03.k44\">$1.5K–$5K/mo. AI is 10–30× cheaper and 24/7.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top: auto; padding: 14px 16px; background: var(--ink); color: var(--paper); display: flex; gap: 12px; align-items: center;\">\n          <div style=\"font-family: var(--serif); font-size: 24px; font-weight: 380; color: var(--paper);\" data-i18n=\"p03.k45\">10× cheaper<\u002Fdiv>\n          <div><div class=\"p-label\" style=\"color: var(--cream);\" data-i18n=\"p03.k46\">SEO vs. paid ads<\u002Fdiv><div style=\"font-family: var(--serif); font-size: 12px; color: var(--paper); margin-top: 2px;\" data-i18n=\"p03.k47\">And the compound effect is the bonus.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"page-chrome-bot\"><span data-i18n=\"p03.k48\">Rep-facing · all specs from SEO catalog<\u002Fspan><span data-i18n=\"p03.k49\">Page 3 / 3<\u002Fspan>\n    <div style=\"flex:1;\"><\u002Fdiv>\n    <div class=\"p1-cta\" style=\"flex-direction: column; align-items: flex-start; gap: 8px;\">\n      <strong style=\"font-size: 20px;\" data-i18n=\"cta.title\">Get Started<\u002Fstrong>\n      <div class=\"p-label\" style=\"color: var(--cream); text-transform: none; letter-spacing: 0; font-size: 12px; line-height: 1.5;\" data-i18n=\"cta.contactfull\" data-html=\"true\">Have questions, want to schedule a demo, or explore how these solutions can support your sales teams today? Contact us at <a href=\"mailto:marketing@hostopia.com\" style=\"color: var(--paper); text-decoration: underline;\">marketing@hostopia.com<\u002Fa> to learn more and connect with one of our experts.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>const LANG = window.LANG = {};<\u002Fscript>\n<script src=\"cf8dccf6-40d9-4996-a994-78df4c9f2dc0\"><\u002Fscript>\n<script>\nfunction applyLang(l){const d=LANG[l];if(!d)return;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(d[k]===undefined)return;if(el.hasAttribute('data-html'))el.innerHTML=d[k];else el.textContent=d[k];});document.documentElement.lang=l;document.querySelectorAll('#lang-toggle button').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));try{localStorage.setItem('seoSlickLang',l);}catch(e){}}\nwindow.applyLang=applyLang;\ndocument.querySelectorAll('#lang-toggle button').forEach(b=>b.addEventListener('click',()=>applyLang(b.dataset.lang)));\nconst s=(()=>{try{return localStorage.getItem('seoSlickLang');}catch(e){return null;}})();\nif(s&&LANG[s])applyLang(s);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
