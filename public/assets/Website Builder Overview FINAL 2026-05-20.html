  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<title>Product Overview — Website Builder<\u002Ftitle>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* ---------- Design system tokens ---------- */\n:root {\n  /* Color */\n  --ink: #1A1F2B;\n  --ink-2: #3A4150;\n  --ink-3: #6B7280;\n  --rule: #D9D6CF;\n  --rule-2: #E8E5DD;\n  --paper: #FAF7F0;\n  --paper-2: #F5EFE3;\n  --paper-3: #EFE8D8;\n  --white: #FFFFFF;\n\n  --teal: #0F6E6E;\n  --teal-deep: #0A4F4F;\n  --teal-pale: #E0EBEA;\n  --teal-tint: #F1F6F5;\n\n  --cream: #F5EFE3;\n  --accent-warm: #C2895A;   /* sparingly */\n  --accent-warm-pale: #F0DFC8;\n\n  /* Type */\n  --serif: \"Newsreader\", \"Source Serif Pro\", Georgia, serif;\n  --sans: \"Geist\", \"Inter Tight\", system-ui, -apple-system, sans-serif;\n  --mono: \"Geist Mono\", \"JetBrains Mono\", ui-monospace, monospace;\n\n  /* Misc */\n  --maxw: 1280px;\n}\n\n/* Reset-ish */\n*, *::before, *::after { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  font-family: var(--sans);\n  color: var(--ink);\n  background: var(--paper);\n  font-feature-settings: \"ss01\", \"cv11\";\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---------- Typography ---------- */\n.serif { font-family: var(--serif); }\n.sans { font-family: var(--sans); }\n.mono { font-family: var(--mono); }\n\n.eyebrow {\n  font-family: var(--mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--teal);\n}\n\n.label {\n  font-family: var(--mono);\n  font-size: 10.5px;\n  font-weight: 500;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--serif);\n  font-weight: 400;\n  letter-spacing: -0.01em;\n  margin: 0;\n  text-wrap: balance;\n  color: var(--ink);\n}\nh1 { font-size: 72px; line-height: 0.98; font-weight: 380; }\nh2 { font-size: 44px; line-height: 1.05; }\nh3 { font-size: 26px; line-height: 1.15; }\nh4 { font-size: 18px; line-height: 1.2; font-family: var(--sans); font-weight: 600; }\n\np { margin: 0; font-size: 15.5px; line-height: 1.55; color: var(--ink-2); }\np.lede { font-size: 19px; line-height: 1.5; color: var(--ink); text-wrap: pretty; }\n\n/* ---------- Reusable components ---------- */\n\n/* Big stat */\n.bigstat {\n  font-family: var(--serif);\n  font-weight: 380;\n  font-size: 120px;\n  line-height: 0.92;\n  letter-spacing: -0.025em;\n  color: var(--ink);\n  font-feature-settings: \"lnum\", \"tnum\";\n}\n.bigstat .unit {\n  font-family: var(--sans);\n  font-size: 0.28em;\n  font-weight: 500;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  vertical-align: 0.45em;\n  color: var(--teal);\n  margin-left: 0.08em;\n}\n\n/* Rules */\n.rule { height: 1px; background: var(--rule); width: 100%; }\n.rule-ink { height: 1px; background: var(--ink); width: 100%; }\n.rule-teal { height: 2px; background: var(--teal); width: 48px; }\n\n/* Square accents - picking up DNA from the original */\n.squares {\n  display: inline-grid;\n  grid-template-columns: 12px 12px;\n  grid-template-rows: 12px 12px;\n  gap: 3px;\n}\n.squares span { background: var(--teal); display: block; }\n.squares span:nth-child(2) { background: var(--cream); }\n.squares span:nth-child(3) { background: var(--accent-warm); }\n.squares span:nth-child(4) { background: var(--ink); }\n\n/* Image slot — drop-in placeholder */\n.imgslot {\n  position: relative;\n  background:\n    repeating-linear-gradient(135deg,\n      var(--paper-3) 0 1px,\n      transparent 1px 12px),\n    var(--paper-2);\n  border: 1px solid var(--rule);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  text-align: center;\n  color: var(--ink-3);\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n}\n.imgslot::before {\n  content: \"\";\n  position: absolute;\n  inset: 10px;\n  border: 1px dashed var(--rule);\n  pointer-events: none;\n}\n.imgslot > span {\n  position: relative;\n  background: var(--paper);\n  padding: 6px 10px;\n  border: 1px solid var(--rule);\n}\n.imgslot.dark {\n  background:\n    repeating-linear-gradient(135deg,\n      rgba(255,255,255,0.04) 0 1px,\n      transparent 1px 12px),\n    var(--teal-deep);\n  border-color: var(--teal-deep);\n  color: rgba(255,255,255,0.7);\n}\n.imgslot.dark > span { background: var(--teal-deep); border-color: rgba(255,255,255,0.2); }\n\n/* Badge / pill */\n.pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--ink);\n  padding: 5px 10px;\n  border: 1px solid var(--ink);\n  border-radius: 999px;\n  background: transparent;\n}\n.pill.solid { background: var(--ink); color: var(--paper); }\n.pill.teal { border-color: var(--teal); color: var(--teal); }\n.pill.teal.solid { background: var(--teal); color: var(--paper); }\n.pill .dot {\n  width: 6px; height: 6px; background: currentColor; border-radius: 50%;\n}\n\n/* Number marker (01, 02...) */\n.num {\n  font-family: var(--mono);\n  font-size: 12px;\n  font-weight: 500;\n  letter-spacing: 0.1em;\n  color: var(--teal);\n}\n.num.lg {\n  font-family: var(--serif);\n  font-size: 56px;\n  font-weight: 380;\n  line-height: 1;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n}\n\n/* Card */\n.card {\n  background: var(--white);\n  border: 1px solid var(--rule);\n  padding: 28px;\n}\n.card.cream { background: var(--paper-2); border-color: var(--paper-3); }\n.card.ink { background: var(--ink); color: var(--paper); border-color: var(--ink); }\n.card.teal { background: var(--teal); color: var(--paper); border-color: var(--teal); }\n\n/* Layout helpers */\n.flex { display: flex; }\n.col { display: flex; flex-direction: column; }\n.between { justify-content: space-between; }\n.center { align-items: center; justify-content: center; }\n.gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; }\n.gap-24 { gap: 24px; } .gap-32 { gap: 32px; } .gap-48 { gap: 48px; }\n\n/* Logo showcase — sample-work grids */\n.logocard {\n  background: var(--white);\n  border: 1px solid var(--rule);\n  aspect-ratio: 4/3;\n  display: flex; align-items: center; justify-content: center;\n  padding: 18px;\n  overflow: hidden;\n}\n.logocard img {\n  max-width: 100%;\n  max-height: 100%;\n  object-fit: contain;\n  display: block;\n}\n.logocard.cream { background: var(--paper-2); border-color: var(--paper-3); }\n.logocard.ink { background: var(--ink); border-color: var(--ink); }\n\n.logogrid {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 8px;\n}\n\n/* Brand mark — generic, swappable */\n.brandmark {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--ink);\n}\n.brandmark .glyph {\n  width: 22px; height: 22px;\n  background: var(--teal);\n  position: relative;\n}\n.brandmark .glyph::after {\n  content: \"\";\n  position: absolute;\n  right: -6px; bottom: -6px;\n  width: 12px; height: 12px;\n  background: var(--cream);\n  border: 1px solid var(--teal);\n}\n<\u002Fstyle>\n\n<style>\n  body { background: #2a2e35; padding: 48px 0; font-family: Arial, sans-serif; }\n  .stack { display: flex; flex-direction: column; gap: 32px; align-items: center; }\n  .page { width: 850px; height: 1100px; background: var(--paper); color: var(--ink); position: relative; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.4); font-family: Arial, sans-serif; }\n  .page.cover { background: var(--ink); color: var(--paper); }\n  .page.cream { background: var(--paper-2); }\n  .pchrome-top, .pchrome-bot { position: absolute; left: 64px; right: 64px; font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; display: flex; justify-content: space-between; color: var(--ink-3); }\n  .pchrome-top { top: 40px; } .pchrome-bot { bottom: 40px; padding-top: 14px; border-top: 1px solid var(--rule); }\n  .page.cover .pchrome-top, .page.cover .pchrome-bot { color: rgba(245,239,227,0.6); }\n  .page.cover .pchrome-bot { border-color: rgba(245,239,227,0.2); }\n  .pbody { position: absolute; top: 88px; bottom: 88px; left: 64px; right: 64px; display: flex; flex-direction: column; }\n  .cover-body { display: flex; flex-direction: column; justify-content: space-between; height: 100%; }\n  .cover-h1 { font-size: 60px; line-height: 1.0; font-weight: 700; letter-spacing: -0.015em; color: var(--paper); }\n  .cover-h1 em { font-style: italic; color: var(--cream); }\n  .cover-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding-top: 24px; border-top: 1px solid rgba(245,239,227,0.2); }\n  .cover-meta .label { color: var(--cream); }\n  .cover-meta .v { font-size: 18px; color: var(--paper); margin-top: 6px; font-weight: 600; }\n  h1.doc-h1 { font-size: 40px; line-height: 1.05; font-weight: 700; }\n  h1.doc-h1 em { font-style: italic; color: var(--teal); }\n  h2.doc-h2 { font-size: 28px; line-height: 1.1; font-weight: 700; }\n  h3.doc-h3 { font-size: 20px; line-height: 1.2; font-weight: 600; }\n  .doc-p { font-size: 13px; line-height: 1.6; color: var(--ink-2); }\n  .doc-p.lede { font-size: 15px; line-height: 1.55; color: var(--ink); }\n  .doc-eyebrow { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--teal); font-weight: 600; }\n  .doc-label { font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; }\n  .toc { display: grid; grid-template-columns: 36px 1fr 48px; gap: 14px; padding: 10px 0; border-top: 1px solid var(--rule); }\n  .toc:last-child { border-bottom: 1px solid var(--rule); }\n  .toc .n { font-size: 10px; letter-spacing: 0.1em; color: var( n=\"plans.chrome\">06 — Plans<\u002Fspan><\u002Fdiv>\n  <div class=\"pbody\">\n    <div class=\"doc-eyebrow\" data-i18n=\"plans.eye\">06 — Plans<\u002Fdiv>\n    <h1 class=\"doc-h1\" style=\"margin-top: 12px;\" data-i18n=\"plans.h\">Three tiers, one platform.<\u002Fh1>\n    <p class=\"doc-p lede\" style=\"margin-top: 18px; max-width: 580px;\" data-i18n=\"plans.sub\">All plans include AI prompt-to-site, drag-and-drop editor, 300+ templates, SEO, mobile-responsive design, and bundled hosting + SSL. Page count, bundled add-ons, and commerce are the differentiators.<\u002Fp>\n    <div class=\"ptable\" style=\"margin-top: 24px;\">\n      <div class=\"hdr\" data-i18n=\"plans.tbl.head\">What's included<\u002Fdiv>\n      <div class=\"hdr\" data-i18n=\"plans.tbl.t1\">Starter<\u002Fdiv>\n      <div class=\"hdr feat\" data-i18n=\"plans.tbl.t2\">Growth · Most popular<\u002Fdiv>\n      <div class=\"hdr\" data-i18n=\"plans.tbl.t3\">Commerce<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"plans.r1\">Pages<\u002Fdiv><div class=\"val\">5<\u002Fdiv><div class=\"val\" data-i18n=\"plans.r1.unl\">Unlimited<\u002Fdiv><div class=\"val\" data-i18n=\"plans.r1.unl\">Unlimited<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"plans.r2\">AI prompt-to-site<\u002Fdiv><div class=\"check\">✓<\u002Fdiv><div class=\"check\">✓<\u002Fdiv><div class=\"check\">✓<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"plans.r3\">Drag-and-drop editor<\u002Fdiv><div class=\"check\">✓<\u002Fdiv><div class=\"check\">✓<\u002Fdiv><div class=\"check\">✓<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"plans.r4\">300+ templates<\u002Fdiv><div class=\"check\">✓<\u002Fdiv><div class=\"check\">✓<\u002Fdiv><div class=\"check\">✓<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"plans.r5\">Mobile-responsive<\u002Fdiv><div class=\"check\">✓<\u002Fdiv><div class=\"check\">✓<\u002Fdiv><div class=\"check\">✓<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"plans.r6\">SEO built in<\u002Fdiv><div class=\"check\">✓<\u002 and\">Product Template<\u002Fspan><span data-i18n=\"play.chrome\">07 — Sales playbook<\u002Fspan><\u002Fdiv>\n  <div class=\"pbody\">\n    <div class=\"doc-eyebrow\" data-i18n=\"play.eye\">07 — Sales playbook<\u002Fdiv>\n    <h1 class=\"doc-h1\" style=\"margin-top: 12px;\" data-i18n=\"play.h\">Discovery, ICP, and competitive.<\u002Fh1>\n    <p class=\"doc-p lede\" style=\"margin-top: 18px; max-width: 580px;\" data-i18n=\"play.sub\">Website Builder is the universal opening — almost every SMB qualifies. The two-question qualifier: \"Do you have a website?\" / \"When was it last updated?\"<\u002Fp>\n    <div class=\"two-col\" style=\"margin-top: 28px;\">\n      <div>\n        <div class=\"doc-label\" style=\"color: var(--teal);\" data-i18n=\"play.q.lbl\">Discovery questions<\u002Fdiv>\n        <div style=\"margin-top: 12px;\">\n          <div class=\"bul\" data-i18n=\"play.q.1\">Do you have a website today?<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"play.q.2\">If yes — when was it last updated, and how easy is it to make changes?<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"play.q.3\">Is it mobile-friendly? When did you last open it on a phone?<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"play.q.4\">How are customers finding you — search, social, referral?<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"play.q.5\">Planning to sell anything online — products or services?<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"play.q.6\">Who currently manages it — you, an agency, family member?<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"play.q.7\">If I built you a site in 30 minutes with AI, would that change things?<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"doc-label\" style=\"color: var(--teal);\" data-i18n=\"play.icp.lbl\">Ideal customer profile<\u002Fdiv>\n        <div style=\"margin-top: 12px;\">\n          <div class=\"bul\" data-i18n=\"play.icp.1\" data-html=\"true\"><strong>No-website SMBs.<\u002Fstrong> Largest segment, easiest pitch.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"play.icp.2\" data-html=\"true\"><strong>Outdated sites.<\u002Fstrong> 5+ year-old, hand-coded, not mobile-friendly.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"play.icp.3\" data-html=\"true\"><strong>Wix / Squarespace users.<\u002Fstrong> Paying $20–40/mo for non-AI.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"play.icp.4\" data-html=\"true\"><strong>New businesses.<\u002Fstrong> Need site + domain + email at once.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"play.icp.5\" data-html=\"true\"><strong>Local services.<\u002Fstrong> Restaurants, salons, contractors.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top: 22px;\">\n          <div class=\"doc-label\" style=\"color: var(--teal);\" data-i18n=\"play.comp.lbl\">Competitive snapshot<\u002Fdiv>\n          <div style=\"margin-top: 10px;\">\n            <div class=\"bul\" data-i18n=\"play.comp.1\" data-html=\"true\"><strong>vs. Wix.<\u002Fstrong> Template-first. We're AI-first — site from prompt in 60 seconds.<\u002Fdiv>\n            <div class=\"bul\" data-i18n=\"play.comp.2\" data-html=\"true\"><strong>vs. Squarespace.<\u002Fstrong> Beautiful templates but no AI. 60 seconds vs. 2 hours of template work.<\u002Fdiv>\n            <div class=\"bul\" data-i18n=\"play.comp.3\" data-html=\"true\"><strong>vs. Freelancer.<\u002Fstrong> $2,000–$10,000 over weeks. AI in minutes; customer keeps control.<\u002Fdiv>\n            <div class=\"bul\" data-i18n=\"play.comp.4\" data-html=\"true\"><strong>vs. WordPress.<\u002Fstrong> Self-hosted complexity. We're all-managed in one subscription.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"pchrome-bot\"><span data-i18n=\"play.foot\">Sales playbook · discovery + competitive<\u002Fspan><span>08<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- P9 OBJECTIONS & FAQ -->\n<div class=\"page\">\n  <div class=\"pchrome-top\"><span data-i18n=\"brand\">Product Template<\u002Fspan><span data-i18n=\"obj.chrome\">08 — Objections &amp; FAQs<\u002Fspan><\u002Fdiv>\n  <div class=\"pbody\">\n    <div class=\"doc-eyebrow\" data-i18n=\"obj.eye\">08 — Objections &amp; FAQs<\u002Fdiv>\n    <h1 class=\"doc-h1\" style=\"margin-top: 12px;\" data-i18n=\"obj.h\">The questions you'll hear most.<\u002Fh1>\n    <div class=\"two-col\" style=\"margin-top: 24px;\">\n      <div>\n        <div class=\"doc-label\" style=\"color: var(--teal);\" data-i18n=\"obj.objs.lbl\">Objection handling<\u002Fdiv>\n        <div style=\"margin-top: 10px;\">\n          <div class=\"obj\"><q data-i18n=\"obj.1.q\">I don't have time to build a website.<\u002Fq><p data-i18n=\"obj.1.p\">AI builds the first draft in 60 seconds. Refining and publishing takes about 30 minutes — the owner can be live by end of day with no design or coding skills.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q data-i18n=\"obj.2.q\">I already have a website.<\u002Fq><p data-i18n=\"obj.2.p\">When was it last updated? Mobile-friendly? AI-generated sites look more modern than most 5-year-old hand-coded sites — and Online Presence Builder bundles hosting, domain, email, and analytics.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q data-i18n=\"obj.3.q\">It's too expensive.<\u002Fq><p data-i18n=\"obj.3.p\">Compare to a freelancer ($2,000–$10,000) or DIY (40+ hours of the owner's time). Online Presence Builder is a low monthly subscription including hosting, domain, SSL, and email.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q data-i18n=\"obj.4.q\">I'd rather hire a designer.<\u002Fq><p data-i18n=\"obj.4.p\">For most SMBs, that's overkill. Designer: weeks. AI: minutes. And the customer keeps editing control — no waiting on a freelancer to change opening hours.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q data-i18n=\"obj.5.q\">What if I outgrow the platform?<\u002Fq><p data-i18n=\"obj.5.p\">Online Presence Builder grows with the business. Add Online Store, Email Marketing, SEO, Marketing 360 — every product in the portfolio plugs in.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q data-i18n=\"obj.6.q\">Will the AI-generated copy sound right?<\u002Fq><p data-i18n=\"obj.6.p\">The AI draft is a starting point — most customers edit 30–50% of the copy. AI shortcuts let you regenerate any section in one click until it sounds right.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"doc-label\" style=\"color: var(--teal);\" data-i18n=\"obj.faq.lbl\">Frequently asked questions<\u002Fdiv>\n        <div style=\"margin-top: 10px;\">\n          <div class=\"obj\"><q style=\"font-style: normal;\" data-i18n=\"obj.f1.q\">How does the AI work?<\u002Fq><p data-i18n=\"obj.f1.p\">Describe the business — industry, audience, style. AI generates a complete first draft in 60 seconds, then refine with one-click shortcuts or manual editing.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q style=\"font-style: normal;\" data-i18n=\"obj.f2.q\">Can I edit everything?<\u002Fq><p data-i18n=\"obj.f2.p\">Yes. Click any text to change it. Drag blocks to reorder. Swap images. Add or remove sections.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q style=\"font-style: normal;\" data-i18n=\"obj.f3.q\">Is hosting included?<\u002Fq><p data-i18n=\"obj.f3.p\">Yes. Every plan includes hosting, SSL, and a custom domain. 99.9% uptime SLA.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q style=\"font-style: normal;\" data-i18n=\"obj.f4.q\">Can I sell online?<\u002Fq><p data-i18n=\"obj.f4.p\">Yes — Commerce plan includes Online Store with payment processing. Or add Online Store to any plan as an upgrade.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q style=\"font-style: normal;\" data-i18n=\"obj.f5.q\">Can I migrate later?<\u002Fq><p data-i18n=\"obj.f5.p\">You own your content. Export pages anytime. Hosting and design are platform-specific (as with any builder).<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q style=\"font-style: normal;\" data-i18n=\"obj.f6.q\">What if I need help?<\u002Fq><p data-i18n=\"obj.f6.p\">24/7 support included. Live chat, email, phone. Plus a knowledge base with video walkthroughs.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q style=\"font-style: normal;\" data-i18n=\"obj.f7.q\">SEO out of the box?<\u002Fq><p data-i18n=\"obj.f7.p\">Yes. Title tags, alt tags, sitemap, meta descriptions, schema. Submit to search from the dashboard.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"pchrome-bot\"><span data-i18n=\"obj.foot\">Objection handling · FAQs<\u002Fspan><span>09<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- P10 FOR SERVICE PROVIDERS -->\n<div class=\"page cream\">\n  <div class=\"pchrome-top\"><span data-i18n=\"brand\">Product Template<\u002Fspan><span data-i18n=\"sp.chrome\">09 — For service providers<\u002Fspan><\u002Fdiv>\n  <div class=\"pbody\">\n    <div class=\"doc-eyebrow\" data-i18n=\"sp.eye\">09 — For service providers<\u002Fdiv>\n    <h1 class=\"doc-h1\" style=\"margin-top: 12px;\" data-i18n=\"sp.h\">The gateway to the entire portfolio.<\u002Fh1>\n    <p class=\"doc-p lede\" style=\"margin-top: 18px; max-width: 580px;\" data-i18n=\"sp.sub\">Website Builder is the foundational product — almost every other SKU in the catalog attaches to a Website Builder subscription. Sell this first; the rest follows.<\u002Fp>\n    <div style=\"margin-top: 28px;\">\n      <div class=\"bul\" data-i18n=\"sp.1\" data-html=\"true\"><strong>Universal opening.<\u002Fstrong> Almost every SMB qualifies. \"Do you have a website?\" opens 80% of conversations.<\u002Fdiv>\n      <div class=\"bul\" data-i18n=\"sp.2\" data-html=\"true\"><strong>Highest LTV anchor.<\u002Fstrong> Customers with a website attach Email Marketing, Online Store, SEO, and Marketing 360 at 3–5x the rate of standalone domain customers.<\u002Fdiv>\n      <div class=\"bul\" data-i18n=\"sp.3\" data-html=\"true\"><strong>Sticky retention.<\u002Fstrong> Once a customer's domain points to their site and email runs through it, churn drops dramatically.<\u002Fdiv>\n      <div class=\"bul\" data-i18n=\"sp.4\" data-html=\"true\"><strong>Easy upsell ladder.<\u002Fstrong> Starter (5 pages) → Growth (unlimited + Email) → Commerce (+ Store). Page count and add-ons are visible meters.<\u002Fdiv>\n      <div class=\"bul\" data-i18n=\"sp.5\" data-html=\"true\"><strong>White-label ready.<\u002Fstrong> Service providers brand the editor, set local pricing, own the customer relationship end-to-end.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex: 1;\"><\u002Fdiv>\n    <div style=\"padding: 24px 28px; background: var(--ink); color: var(--paper);\">\n      <div style=\"font-family: var(--serif); font-size: 26px; color: var(--paper);\" data-i18n=\"cta.title\">Get Started<\u002Fdiv>\n      <div style=\"font-size: 13px; line-height: 1.55; margin-top: 10px; color: rgba(245,239,227,0.92); max-width: 660px;\" data-i18n=\"cta.contactfull\" data-html=\"true\">Have questions, want to schedule a demo, or explore how these solutions can support your sales teams today? Contact us at <a href=\"mailto:marketing@hostopia.com\" style=\"color: var(--paper); text-decoration: underline;\">marketing@hostopia.com<\u002Fa> to learn more and connect with one of our experts.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"pchrome-bot\"><span data-i18n=\"sp.foot\">© 2026 · Generic Product Template · v2.1 · All rights reserved<\u002Fspan><span>10<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>const LANG = window.LANG = {};<\u002Fscript>\n<script src=\"eb70933e-cce9-42a9-82d7-1de9f8ab966b\"><\u002Fscript>\n<script>\nfunction applyLang(l){const d=LANG[l];if(!d)return;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(d[k]===undefined)return;if(el.hasAttribute('data-html'))el.innerHTML=d[k];else el.textContent=d[k];});document.documentElement.lang=l;document.querySelectorAll('#lang-toggle button').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));try{localStorage.setItem('wbOverviewLang',l);}catch(e){}}\nwindow.applyLang=applyLang;\ndocument.querySelectorAll('#lang-toggle button').forEach(b=>b.addEventListener('click',()=>applyLang(b.dataset.lang)));\nconst s=(()=>{try{return localStorage.getItem('wbOverviewLang');}catch(e){return null;}})();\nif(s&&LANG[s])applyLang(s);\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
