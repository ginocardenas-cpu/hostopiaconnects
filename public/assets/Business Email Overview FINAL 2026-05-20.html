  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

01, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"3b02d85d-be9f-410a-86bb-f7639f99770b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"a7ad2cea-7810-455b-96f7-d92e89c81dcd\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ---------- Design system tokens ---------- */\n:root {\n  /* Color */\n  --ink: #1A1F2B;\n  --ink-2: #3A4150;\n  --ink-3: #6B7280;\n  --rule: #D9D6CF;\n  --rule-2: #E8E5DD;\n  --paper: #FAF7F0;\n  --paper-2: #F5EFE3;\n  --paper-3: #EFE8D8;\n  --white: #FFFFFF;\n\n  --teal: #0F6E6E;\n  --teal-deep: #0A4F4F;\n  --teal-pale: #E0EBEA;\n  --teal-tint: #F1F6F5;\n\n  --cream: #F5EFE3;\n  --accent-warm: #C2895A;   /* sparingly */\n  --accent-warm-pale: #F0DFC8;\n\n  /* Type */\n  --serif: \"Newsreader\", \"Source Serif Pro\", Georgia, serif;\n  --sans: \"Geist\", \"Inter Tight\", system-ui, -apple-system, sans-serif;\n  --mono: \"Geist Mono\", \"JetBrains Mono\", ui-monospace, monospace;\n\n  /* Misc */\n  --maxw: 1280px;\n}\n\n/* Reset-ish */\n*, *::before, *::after { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  font-family: var(--sans);\n  color: var(--ink);\n  background: var(--paper);\n  font-feature-settings: \"ss01\", \"cv11\";\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---------- Typography ---------- */\n.serif { font-family: var(--serif); }\n.sans { font-family: var(--sans); }\n.mono { font-family: var(--mono); }\n\n.eyebrow {\n  font-family: var(--mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--teal);\n}\n\n.label {\n  font-family: var(--mono);\n  font-size: 10.5px;\n  font-weight: 500;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--serif);\n  font-weight: 400;\n  letter-spacing: -0.01em;\n  margin: 0;\n  text-wrap: balance;\n  color: var(--ink);\n}\nh1 { font-size: 72px; line-height: 0.98; font-weight: 380; }\nh2 { font-size: 44px; line-height: 1.05; }\nh3 { font-size: 26px; line-height: 1.15; }\nh4 { font-size: 18px; line-height: 1.2; font-family: var(--sans); font-weight: 600; }\n\np { margin: 0; font-size: 15.5px; line-height: 1.55; color: var(--ink-2); }\np.lede { font-size: 19px; line-height: 1.5; color: var(--ink); text-wrap: pretty; }\n\n/* ---------- Reusable components ---------- */\n\n/* Big stat */\n.bigstat {\n  font-family: var(--serif);\n  font-weight: 380;\n  font-size: 120px;\n  line-height: 0.92;\n  letter-spacing: -0.025em;\n  color: var(--ink);\n  font-feature-settings: \"lnum\", \"tnum\";\n}\n.bigstat .unit {\n  font-family: var(--sans);\n  font-size: 0.28em;\n  font-weight: 500;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  vertical-align: 0.45em;\n  color: var(--teal);\n  margin-left: 0.08em;\n}\n\n/* Rules */\n.rule { height: 1px; background: var(--rule); width: 100%; }\n.rule-ink { height: 1px; background: var(--ink); width: 100%; }\n.rule-teal { height: 2px; background: var(--teal); width: 48px; }\n\n/* Square accents - picking up DNA from the original */\n.squares {\n  display: inline-grid;\n  grid-template-columns: 12px 12px;\n  grid-template-rows: 12px 12px;\n  gap: 3px;\n}\n.squares span { background: var(--teal); display: block; }\n.squares span:nth-child(2) { background: var(--cream); }\n.squares span:nth-child(3) { background: var(--accent-warm); }\n.squares span:nth-child(4) { background: var(--ink); }\n\n/* Image slot — drop-in placeholder */\n.imgslot {\n  position: relative;\n  background:\n    repeating-linear-gradient(135deg,\n      var(--paper-3) 0 1px,\n      transparent 1px 12px),\n    var(--paper-2);\n  border: 1px solid var(--rule);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  text-align: center;\n  color: var(--ink-3);\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n}\n.imgslot::before {\n  content: \"\";\n  position: absolute;\n  inset: 10px;\n  border: 1px dashed var(--rule);\n  pointer-events: none;\n}\n.imgslot > span {\n  position: relative;\n  background: var(--paper);\n  padding: 6px 10px;\n  border: 1px solid var(--rule);\n}\n.imgslot.dark {\n  background:\n    repeating-linear-gradient(135deg,\n      rgba(255,255,255,0.04) 0 1px,\n      transparent 1px 12px),\n    var(--teal-deep);\n  border-color: var(--teal-deep);\n  color: rgba(255,255,255,0.7);\n}\n.imgslot.dark > span { background: var(--teal-deep); border-color: rgba(255,255,255,0.2); }\n\n/* Badge / pill */\n.pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--ink);\n  padding: 5px 10px;\n  border: 1px solid var(--ink);\n  border-radius: 999px;\n  background: transparent;\n}\n.pill.solid { background: var(--ink); color: var(--paper); }\n.pill.teal { border-color: var(--teal); color: var(--teal); }\n.pill.teal.solid { background: var(--teal); color: var(--paper); }\n.pill .dot {\n  width: 6px; height: 6px; background: currentColor; border-radius: 50%;\n}\n\n/* Number marker (01, 02...) */\n.num {\n  font-family: var(--mono);\n  font-size: 12px;\n  font-weight: 500;\n  letter-spacing: 0.1em;\n  color: var(--teal);\n}\n.num.lg {\n  font-family: var(--serif);\n  font-size: 56px;\n  font-weight: 380;\n  line-height: 1;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n}\n\n/* Card */\n.card {\n  background: var(--white);\n  border: 1px solid var(--rule);\n  padding: 28px;\n}\n.card.cream { background: var(--paper-2); border-color: var(--paper-3); }\n.card.ink { background: var(--ink); color: var(--paper); border-color: var(--ink); }\n.card.teal { background: var(--teal); color: var(--paper); border-color: var(--teal); }\n\n/* Layout helpers */\n.flex { display: flex; }\n.col { display: flex; flex-direction: column; }\n.between { justify-content: space-between; }\n.center { align-items: center; justify-content: center; }\n.gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; }\n.gap-24 { gap: 24px; } .gap-32 { gap: 32px; } .gap-48 { gap: 48px; }\n\n/* Logo showcase — sample-work grids */\n.logocard {\n  background: var(--white);\n  border: 1px solid var(--rule);\n  aspect-ratio: 4/3;\n  display: flex; align-items: center; justify-content: center;\n  padding: 18px;\n  overflow: hidden;\n}\n.logocard img {\n  max-width: 100%;\n  max-height: 100%;\n  object-fit: contain;\n  display: block;\n}\n.logocard.cream { background: var(--paper-2); border-color: var(--paper-3); }\n.logocard.ink { background: var(--ink); border-color: var(--ink); }\n\n.logogrid {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 8px;\n}\n\n/* Brand mark — generic, swappable */\n.brandmark {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--ink);\n}\n.brandmark .glyph {\n  width: 22px; height: 22px;\n  background: var(--teal);\n  position: relative;\n}\n.brandmark .glyph::after {\n  content: \"\";\n  position: absolute;\n  right: -6px; bottom: -6px;\n  width: 12px; height: 12px;\n  background: var(--cream);\n  border: 1px solid var(--teal);\n}\n<\u002Fstyle>\n\n\n<style>\n  body { background: #2a2e35; padding: 48px 0; }\n  .stack { display: flex; flex-direction: column; gap: 32px; align-items: center; }\n  .page { width: 850px; height: 1100px; background: var(--paper); color: var(--ink); position: relative; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.4); }\n  .page.cover { background: var(--ink); color: var(--paper); }\n  .page.cream { background: var(--paper-2); }\n  .pchrome-top, .pchrome-bot { position: absolute; left: 64px; right: 64px; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; color: var(--ink-3); }\n  .pchrome-top { top: 40px; }\n  .pchrome-bot { bottom: 40px; padding-top: 14px; border-top: 1px solid var(--rule); }\n  .page.cover .pchrome-top, .page.cover .pchrome-bot { color: rgba(245,239,227,0.6); }\n  .page.cover .pchrome-bot { border-color: rgba(245,239,227,0.2); }\n  .pbody { position: absolute; top: 88px; bottom: 88px; left: 64px; right: 64px; display: flex; flex-direction: column; }\n  .cover-body { display: flex; flex-direction: column; justify-content: space-between; height: 100%; }\n  .cover-h1 { font-family: var(--serif); font-size: 64px; line-height: 0.98; font-weight: 380; letter-spacing: -0.015em; color: var(--paper); }\n  .cover-h1 em { font-style: italic; color: var(--cream); }\n  .cover-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding-top: 24px; border-top: 1px solid rgba(245,239,227,0.2); }\n  .cover-meta .label { color: var(--cream); }\n  .cover-meta .v { font-family: var(--serif); font-size: 18px; color: var(--paper); margin-top: 6px; }\n  h1.doc-h1 { font-family: var(--serif); font-size: 44px; line-height: 1.05; font-weight: 400; }\n  h1.doc-h1 em { font-style: italic; color: var(--teal); }\n  h2.doc-h2 { font-family: var(--serif); font-size: 32px; line-height: 1.1; font-weight: 400; }\n  h3.doc-h3 { font- see sales lift. The brand exposure on every email is free advertising every time someone hits send.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"margin-top: 28px;\">\n      <div class=\"doc-label\" data-i18n=\"p03.k05\">Key market data &amp; specs · 2025<\u002Fdiv>\n      <div style=\"margin-top: 12px;\">\n        <div class=\"data-row\"><div class=\"v\" data-i18n=\"p03.k06\">75%<\u002Fdiv><p data-i18n=\"p03.k07\">Of consumers say a professional, domain-based email address is key to trusting a business.<\u002Fp><div class=\"src\" data-i18n=\"p03.k08\">Mailbird<\u002Fdiv><\u002Fdiv>\n        <div class=\"data-row\"><div class=\"v\" data-i18n=\"p03.k09\">60%<\u002Fdiv><p data-i18n=\"p03.k10\">Of businesses that switched to custom domain email saw higher customer engagement.<\u002Fp><div class=\"src\" data-i18n=\"p03.k11\">Privy<\u002Fdiv><\u002Fdiv>\n        <div class=\"data-row\"><div class=\"v\" data-i18n=\"p03.k12\">42%<\u002Fdiv><p data-i18n=\"p03.k13\">Of businesses that switched to custom domain email saw an increase in sales.<\u002Fp><div class=\"src\" data-i18n=\"p03.k14\">Privy<\u002Fdiv><\u002Fdiv>\n        <div class=\"data-row\"><div class=\"v\" data-i18n=\"p03.k15\">95–99%<\u002Fdiv><p data-i18n=\"p03.k16\">Standard spam filter accuracy at differentiating legitimate from spam mail.<\u002Fp><div class=\"src\" data-i18n=\"p03.k17\">Spec<\u002Fdiv><\u002Fdiv>\n        <div class=\"data-row\"><div class=\"v\">3<\u002Fdiv><p data-i18n=\"p03.k18\">Spam filter strength levels available: Light, Standard, Aggressive.<\u002Fp><div class=\"src\" data-i18n=\"p03.k19\">Spec<\u002Fdiv><\u002Fdiv>\n        <div class=\"data-row\"><div class=\"v\" data-i18n=\"p03.k20\">~10 min<\u002Fdiv><p data-i18n=\"p03.k21\">From purchase to first branded email sent.<\u002Fp><div class=\"src\" data-i18n=\"p03.k22\">Spec<\u002Fdiv><\u002Fdiv>\n        <div class=\"data-row\"><div class=\"v\" data-i18n=\"p03.k23\">Unlimited<\u002Fdiv><p data-i18n=\"p03.k24\">Mailboxes per domain (subject to plan tier limits).<\u002Fp><div class=\"src\" data-i18n=\"p03.k25\">Spec<\u002Fdiv><\u002Fdiv>\n        <div class=\"data-row\"><div class=\"v\">24/7<\u002Fdiv><p data-i18n=\"p03.k26\">Anti-virus and anti-spam monitoring on every mailbox.<\u002Fp><div class=\"src\" data-i18n=\"p03.k27\">Spec<\u002Fdiv><\u002Fdiv>\n        <div class=\"data-row\"><div class=\"v\" data-i18n=\"p03.k28\">POP/IMAP<\u002Fdiv><p data-i18n=\"p03.k29\">Desktop client connectivity — Outlook, Apple Mail, Thunderbird via SSL.<\u002Fp><div class=\"src\" data-i18n=\"p03.k30\">Spec<\u002Fdiv><\u002Fdiv>\n        <div class=\"data-row\"><div class=\"v\" data-i18n=\"p03.k31\">Web<\u002Fdiv><p data-i18n=\"p03.k32\">Anywhere browser access — no software install required.<\u002Fp><div class=\"src\" data-i18n=\"p03.k33\">Spec<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"pchrome-bot\"><span data-i18n=\"p03.k34\">The opportunity · product specs<\u002Fspan><span>03<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\">\n  <div class=\"pchrome-top\"><span class=\"brandmark\" style=\"font-size: 10px;\" data-i18n=\"p04.k01\"><span class=\"glyph\" style=\"width: 16px; height: 16px;\"><\u002Fspan>Product Template<\u002Fspan><span data-i18n=\"p04.k02\">03 — The product<\u002Fspan><\u002Fdiv>\n  <div class=\"pbody\">\n    <div class=\"doc-eyebrow\" data-i18n=\"p04.k03\">03 — The product<\u002Fdiv>\n    <h1 class=\"doc-h1\" style=\"margin-top: 12px;\" data-i18n=\"p04.k04\">Built for SMBs. Not for enterprise.<\u002Fh1>\n    <p class=\"doc-p lede\" style=\"margin-top: 18px; max-width: 580px;\" data-i18n=\"p04.k05\">Business Class Email focuses on what SMBs actually need — domain credibility, multi-inbox, tasks, shared calendars, security — at a fraction of Google Workspace and Microsoft 365 pricing.<\u002Fp>\n    <div class=\"two-col\" style=\"margin-top: 28px;\">\n      <div>\n        <div class=\"doc-label\" style=\"color: var(--teal);\" data-i18n=\"p04.k06\">Who it's for<\u002Fdiv>\n        <div style=\"margin-top: 12px;\">\n          <div class=\"bul\" data-i18n=\"p04.k07\" data-html=\"true\"><strong>@gmail.com businesses.<\u002Fstrong> Largest segment. Established businesses still using personal email for work.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p04.k08\" data-html=\"true\"><strong>Existing domain customers.<\u002Fstrong> Already paying for the domain — email is the obvious attach.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p04.k09\" data-html=\"true\"><strong>Google Workspace cost-cutters.<\u002Fstrong> Paying $6–$18/user/mo for features they don't use.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p04.k10\" data-html=\"true\"><strong>Customer-facing teams.<\u002Fstrong> Sales, support, agencies — anyone who emails customers daily.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p04.k11\" data-html=\"true\"><strong>Role-based teams.<\u002Fstrong> Need sales@, info@, support@, careers@ on one domain.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"doc-label\" style=\"color: var(--teal);\" data-i18n=\"p04.k12\">Why it wins<\u002Fdiv>\n        <div style=\"margin-top: 12px;\">\n          <div class=\"bul\" data-i18n=\"p04.k13\" data-html=\"true\"><strong>Domain ownership stays.<\u002Fstrong> Change providers, keep the email address. Not true with @gmail.com or @outlook.com.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p04.k14\" data-html=\"true\"><strong>Productivity bundled.<\u002Fstrong> Multi-inbox, task box, shared calendaring, themes — included in every plan.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p04.k15\" data-html=\"true\"><strong>Lower TCO.<\u002Fstrong> Fraction of Google Workspace or Microsoft 365 pricing for the features SMBs actually use.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p04.k16\" data-html=\"true\"><strong>Ad-free + secure.<\u002Fstrong> 95–99% spam accuracy. Three filter strengths. No ads in the inbox.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p04.k17\" data-html=\"true\"><strong>Bundles with domain.<\u002Fstrong> One bill, one provider — the natural attach to every domain purchase.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"pchrome-bot\"><span data-i18n=\"p04.k18\">The product · audience &amp; differentiation<\u002Fspan><span>04<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\">\n  <div class=\"pchrome-top\"><span class=\"brandmark\" style=\"font-size: 10px;\" data-i18n=\"p05.k01\"><span class=\"glyph\" style=\"width: 16px; height: 16px;\"><\u002Fspan>Product Template<\u002Fspan><span data-i18n=\"p05.k02\">04 — Features &amp; deliverables<\u002Fspan><\u002Fdiv>\n  <div class=\"pbody\">\n    <div class=\"doc-eyebrow\" data-i18n=\"p05.k03\">04 — Features &amp; deliverables<\u002Fdiv>\n    <h1 class=\"doc-h1\" style=\"margin-top: 12px;\" data-i18n=\"p05.k04\">What every mailbox includes.<\u002Fh1>\n    <p class=\"doc-p lede\" style=\"margin-top: 18px; max-width: 580px;\" data-i18n=\"p05.k05\">Eight core capabilities. Standard across every Business Class plan — mailbox size and add-on capacity differ across tiers.<\u002Fp>\n    <div class=\"ftable\" style=\"margin-top: 24px;\">\n      <div data-i18n=\"p05.k06\">Custom domain address<\u002Fdiv><div data-i18n=\"p05.k07\">Email at the customer's domain — sales@yourbusiness.com. Brand promoted on every outgoing message; credibility on every inbound.<\u002Fdiv>\n      <div data-i18n=\"p05.k08\">Task box<\u002Fdiv><div data-i18n=\"p05.k09\">Turn emails into categories and assignable tasks. Due dates, reminders, attachments, subtasks, collaborators. Filter inbox by tagged tasks.<\u002Fdiv>\n      <div data-i18n=\"p05.k10\">Calendaring<\u002Fdiv><div data-i18n=\"p05.k11\">Personal and shared calendars. Read-only or read/edit/delete permissions. Free/busy + custom hours. Recurring events. Subscribe to shared calendars.<\u002Fdiv>\n      <div data-i18n=\"p05.k12\">Multi-inbox view<\u002Fdiv><div data-i18n=\"p05.k13\">See sales@, support@, info@ in a single pane. Vertical split, horizontal split, or horizontal full-page layouts. No tab-hopping.<\u002Fdiv>\n      <div data-i18n=\"p05.k14\">Anti-spam + anti-virus<\u002Fdiv><div data-i18n=\"p05.k15\">Three filter strength levels (Light / Standard / Aggressive). Standard achieves 95–99% accuracy. Trusted senders + blocked senders lists. 24/7 monitoring.<\u002Fdiv>\n      <div data-i18n=\"p05.k16\">Ad-free experience<\u002Fdiv><div data-i18n=\"p05.k17\">Zero ads in the inbox. No tracking. Customers focus on email, not promotions.<\u002Fdiv>\n      <div data-i18n=\"p05.k18\">Themes &amp; branding<\u002Fdiv><div data-i18n=\"p05.k19\">Customize color and background image per inbox. Partner white-label option for branded experience.<\u002Fdiv>\n      <div data-i18n=\"p05.k20\">POP/IMAP support<\u002Fdiv><div data-i18n=\"p05.k21\">Connect Outlook, Apple Mail, Thunderbird via secure SSL connection. Desktop client choice for users who prefer them.<\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"doc-p\" style=\"margin-top: 14px; font-size: 10.5px; color: var(--ink-3);\" data-i18n=\"disc.text\">Plans, features, and pricing are provided for illustrative purposes only and may vary based on your go-to-market strategy. Availability of certain features and services may differ by region.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"pchrome-bot\"><span data-i18n=\"p05.k22\">Features &amp; deliverables · all eight<\u002Fspan><span>05<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page cream\">\n  <div class=\"pchrome-top\"><span class=\"brandmark\" style=\"font-size: 10px;\" data-i18n=\"p06.k01\"><span class=\"glyph\" style=\"width: 16px; height: 16px;\"><\u002Fspan>Product Template<\u002Fspan><span data-i18n=\"p06.k02\">05 — How it works<\u002Fspan><\u002Fdiv>\n  <div class=\"pbody\">\n    <div class=\"doc-eyebrow\" data-i18n=\"p06.k03\">05 — How it works<\u002Fdiv>\n    <h1 class=\"doc-h1\" style=\"margin-top: 12px;\" data-i18n=\"p06.k04\">From purchase to first email in 10 minutes.<\u002Fh1>\n    <p class=\"doc-p lede\" style=\"margin-top: 18px; max-width: 580px;\" data-i18n=\"p06.k05\">Five guided steps. Web-based — login from anywhere. Or connect Outlook via POP/IMAP if the customer prefers a desktop client.<\u002Fp>\n    <div style=\"margin-top: 26px;\">\n      <div class=\"proc\"><div class=\"num\" data-i18n=\"p06.k06\">Step 01<br>Buy<\u002Fdiv><div><h3 class=\"doc-h3\" data-i18n=\"p06.k07\">Domain + email package<\u002Fh3><p class=\"doc-p\" data-i18n=\"p06.k08\">Customer purchases the domain (if not already owned) and email package together. Welcome email arrives with portal credentials.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"proc\"><div class=\"num\" data-i18n=\"p06.k09\">Step 02<br>Login<\u002Fdiv><div><h3 class=\"doc-h3\" data-i18n=\"p06.k10\">Customer portal access<\u002Fh3><p class=\"doc-p\" data-i18n=\"p06.k11\">First login surfaces \"Add email\" in quick-access apps. One click to mailbox creation.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"proc\"><div class=\"num\" data-i18n=\"p06.k12\">Step 03<br>Create<\u002Fdiv><div><h3 class=\"doc-h3\" data-i18n=\"p06.k13\">Add mailboxes<\u002Fh3><p class=\"doc-p\" data-i18n=\"p06.k14\">Name on the email, optional forwarding to another address. Create sales@, info@, support@ — as many as the plan allows.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"proc\"><div class=\"num\" data-i18n=\"p06.k15\">Step 04<br>Configure<\u002Fdiv><div><h3 class=\"doc-h3\" data-i18n=\"p06.k16\">Themes, filters, calendar<\u002Fh3><p class=\"doc-p\" data-i18n=\"p06.k17\">Pick a theme. Set spam filter level. Add trusted senders. Configure calendar preferences (default view, working hours, sharing).<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"proc\"><div class=\"num\" data-i18n=\"p06.k18\">Step 05<br>Send<\u002Fdiv><div><h3 class=\"doc-h3\" data-i18n=\"p06.k19\">First branded email<\u002Fh3><p class=\"doc-p\" data-i18n=\"p06.k20\">Compose with placeholders, attach files, send. Or set up POP/IMAP in Outlook (Account Settings → Advanced) for desktop access.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top: 22px; padding: 18px 20px; background: var(--ink); color: var(--paper); display: flex; gap: 24px; align-items: center;\">\n      <div style=\"font-family: var(--serif); font-size: 36px; font-weight: 380; color: var(--paper); line-height: 1;\" data-i18n=\"p06.k21\" data-html=\"true\">~10<br><span style=\"font-size: 12px; color: var(--cream); letter-spacing: 0.1em;\">MINUTES<\u002Fspan><\u002Fdiv>\n      <div style=\"font-family: var(--serif); font-size: 16px; color: var(--paper); flex: 1;\" data-i18n=\"p06.k22\">From package purchase to first branded email sent. Web-based portal — manage one mailbox or fifty from the same dashboard.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"pchrome-bot\"><span data-i18n=\"p06.k23\">How it works · five guided steps<\u002Fspan><span>06<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\">\n  <div class=\"pchrome-top\"><span class=\"brandmark\" style=\"font-size: 10px;\" data-i18n=\"p07.k01\"><span class=\"glyph\" style=\"width: 16px; height: 16px;\"><\u002Fspan>Product Template<\u002Fspan><span data-i18n=\"p07.k02\">06 — Plans<\u002Fspan><\u002Fdiv>\n  <div class=\"pbody\">\n    <div class=\"doc-eyebrow\" data-i18n=\"p07.k03\">06 — Plans<\u002Fdiv>\n    <h1 class=\"doc-h1\" style=\"margin-top: 12px;\" data-i18n=\"p07.k04\">Three tiers, by mailbox size.<\u002Fh1>\n    <p class=\"doc-p lede\" style=\"margin-top: 18px; max-width: 580px;\" data-i18n=\"p07.k05\">All plans include domain-based addressing, anti-spam, calendaring, and ad-free webmail. ISP Email is the entry option; Business Class Pro is the SMB sweet spot; Premium adds team collaboration features.<\u002Fp>\n    <div class=\"ptable\" style=\"margin-top: 24px;\">\n      <div class=\"hdr\" data-i18n=\"p07.k06\">What's included<\u002Fdiv>\n      <div class=\"hdr\" data-i18n=\"p07.k07\">ISP Basic<\u002Fdiv>\n      <div class=\"hdr feat\" data-i18n=\"p07.k08\">BCE Pro · Most popular<\u002Fdiv>\n      <div class=\"hdr\" data-i18n=\"p07.k09\">BCE Premium<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"p07.k10\">Domain-based address<\u002Fdiv>\n      <div class=\"check\" data-i18n=\"p07.k11\">✓<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k12\">✓<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k13\">✓<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"p07.k14\">Webmail access<\u002Fdiv>\n      <div class=\"check\" data-i18n=\"p07.k15\">✓<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k16\">✓<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k17\">✓<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"p07.k18\">Anti-spam + anti-virus<\u002Fdiv>\n      <div class=\"check\" data-i18n=\"p07.k19\">✓<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k20\">✓<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k21\">✓<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"p07.k22\">Ad-free inbox<\u002Fdiv>\n      <div class=\"check\" data-i18n=\"p07.k23\">✓<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k24\">✓<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k25\">✓<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"p07.k26\">Personal calendar<\u002Fdiv>\n      <div class=\"check\" data-i18n=\"p07.k27\">✓<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k28\">✓<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k29\">✓<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"p07.k30\">Mailbox size<\u002Fdiv>\n      <div class=\"val\" data-i18n=\"p07.k31\">Standard<\u002Fdiv><div class=\"val\" data-i18n=\"p07.k32\">Larger<\u002Fdiv><div class=\"val\" data-i18n=\"p07.k33\">Maximum<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"p07.k34\">Multi-inbox view<\u002Fdiv>\n      <div class=\"dash\">—<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k35\">✓<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k36\">✓<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"p07.k37\">Task box<\u002Fdiv>\n      <div class=\"dash\">—<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k38\">✓<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k39\">✓<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"p07.k40\">Themes<\u002Fdiv>\n      <div class=\"dash\">—<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k41\">✓<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k42\">✓<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"p07.k43\">POP/IMAP for Outlook<\u002Fdiv>\n      <div class=\"dash\">—<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k44\">✓<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k45\">✓<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"p07.k46\">Shared team calendars<\u002Fdiv>\n      <div class=\"dash\">—<\u002Fdiv><div class=\"dash\">—<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k47\">✓<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"p07.k48\">Multi-user roles<\u002Fdiv>\n      <div class=\"dash\">—<\u002Fdiv><div class=\"dash\">—<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k49\">✓<\u002Fdiv>\n      <div class=\"row-h\" data-i18n=\"p07.k50\">Priority support<\u002Fdiv>\n      <div class=\"dash\">—<\u002Fdiv><div class=\"dash\">—<\u002Fdiv><div class=\"check\" data-i18n=\"p07.k51\">✓<\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"doc-p\" style=\"margin-top: 12px; font-size: 10.5px; color: var(--ink-3);\" data-i18n=\"disc.note\" data-html=\"true\"><strong style=\"color: var(--ink);\">Note.<\u002Fstrong> Plans, features, and pricing are provided for illustrative purposes only and may vary based on your go-to-market strategy. Availability of certain features and services may differ by region.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"pchrome-bot\"><span data-i18n=\"p07.k53\">Plans · 3-tier comparison<\u002Fspan><span>07<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\">\n  <div class=\"pchrome-top\"><span class=\"brandmark\" style=\"font-size: 10px;\" data-i18n=\"p08.k01\"><span class=\"glyph\" style=\"width: 16px; height: 16px;\"><\u002Fspan>Product Template<\u002Fspan><span data-i18n=\"p08.k02\">07 — Sales playbook<\u002Fspan><\u002Fdiv>\n  <div class=\"pbody\">\n    <div class=\"doc-eyebrow\" data-i18n=\"p08.k03\">07 — Sales playbook<\u002Fdiv>\n    <h1 class=\"doc-h1\" style=\"margin-top: 12px;\" data-i18n=\"p08.k04\">Discovery, ICP, and competitive.<\u002Fh1>\n    <p class=\"doc-p lede\" style=\"margin-top: 18px; max-width: 580px;\" data-i18n=\"p08.k05\">Business Email is a universal attach to any domain. The qualifier is \"what email do you use to contact customers?\" — anyone saying @gmail.com or @outlook.com is a candidate.<\u002Fp>\n    <div class=\"two-col\" style=\"margin-top: 28px;\">\n      <div>\n        <div class=\"doc-label\" style=\"color: var(--teal);\" data-i18n=\"p08.k06\">Discovery questions<\u002Fdiv>\n        <div style=\"margin-top: 12px;\">\n          <div class=\"bul\" data-i18n=\"p08.k07\">What email do you use to contact customers — @gmail or @yourdomain?<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p08.k08\">Have customers asked \"is this really from you?\" when you email?<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p08.k09\">How much are you paying for Google Workspace or Microsoft 365?<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p08.k10\">How many separate inboxes do you check daily?<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p08.k11\">Do you ever forget to follow up on customer emails?<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p08.k12\">If you switched providers, would you keep the same email address?<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p08.k13\">Is your domain registered with us, or somewhere else?<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"doc-label\" style=\"color: var(--teal);\" data-i18n=\"p08.k14\">Ideal customer profile<\u002Fdiv>\n        <div style=\"margin-top: 12px;\">\n          <div class=\"bul\" data-i18n=\"p08.k15\" data-html=\"true\"><strong>@gmail.com businesses.<\u002Fstrong> Largest segment; easiest pitch.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p08.k16\" data-html=\"true\"><strong>Existing domain customers.<\u002Fstrong> Already paying for the domain.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p08.k17\" data-html=\"true\"><strong>Google Workspace users.<\u002Fstrong> Paying $6–$18/user/mo, using 20% of it.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p08.k18\" data-html=\"true\"><strong>Customer-facing teams.<\u002Fstrong> Sales, support, agencies.<\u002Fdiv>\n          <div class=\"bul\" data-i18n=\"p08.k19\" data-html=\"true\"><strong>Role-based teams.<\u002Fstrong> Need sales@, info@, support@ on one domain.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top: 22px;\">\n          <div class=\"doc-label\" style=\"color: var(--teal);\" data-i18n=\"p08.k20\">Competitive snapshot<\u002Fdiv>\n          <div style=\"margin-top: 10px;\">\n            <div class=\"bul\" data-i18n=\"p08.k21\" data-html=\"true\"><strong>vs. Google Workspace.<\u002Fstrong> $6–$18/user/mo. Feature-rich but expensive. We focus on SMB essentials at lower cost.<\u002Fdiv>\n            <div class=\"bul\" data-i18n=\"p08.k22\" data-html=\"true\"><strong>vs. Microsoft 365.<\u002Fstrong> Assumes Office. For email-only businesses, we're a fraction of the cost.<\u002Fdiv>\n            <div class=\"bul\" data-i18n=\"p08.k23\" data-html=\"true\"><strong>vs. Free Gmail.<\u002Fstrong> 75% of consumers say domain email is key to trust. Free in dollars, expensive in credibility.<\u002Fdiv>\n            <div class=\"bul\" data-i18n=\"p08.k24\" data-html=\"true\"><strong>vs. Standalone email host.<\u002Fstrong> Cheaper hosts skip multi-inbox, tasks, calendaring, ad-free. We bundle.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"pchrome-bot\"><span data-i18n=\"p08.k25\">Sales playbook · discovery + competitive<\u002Fspan><span>08<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\">\n  <div class=\"pchrome-top\"><span class=\"brandmark\" style=\"font-size: 10px;\" data-i18n=\"p09.k01\"><span class=\"glyph\" style=\"width: 16px; height: 16px;\"><\u002Fspan>Product Template<\u002Fspan><span data-i18n=\"p09.k02\">08 — Objections &amp; FAQs<\u002Fspan><\u002Fdiv>\n  <div class=\"pbody\">\n    <div class=\"doc-eyebrow\" data-i18n=\"p09.k03\">08 — Objections &amp; FAQs<\u002Fdiv>\n    <h1 class=\"doc-h1\" style=\"margin-top: 12px;\" data-i18n=\"p09.k04\">The questions you'll hear most.<\u002Fh1>\n    <div class=\"two-col\" style=\"margin-top: 24px;\">\n      <div>\n        <div class=\"doc-label\" style=\"color: var(--teal);\" data-i18n=\"p09.k05\">Objection handling<\u002Fdiv>\n        <div style=\"margin-top: 10px;\">\n          <div class=\"obj\"><q data-i18n=\"p09.k06\">I'd rather use my personal email.<\u002Fq><p data-i18n=\"p09.k07\">Domain-based email builds trust and credibility. If a well-known business like Starbucks reached out from @gmail.com, would you trust it? Same applies to your customers.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q data-i18n=\"p09.k08\">I'm comfortable with my current service.<\u002Fq><p data-i18n=\"p09.k09\">Great. Now imagine you change providers next year. @gmail.com stays with Google. @yourdomain.com stays with you — and so does every customer relationship attached to it.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q data-i18n=\"p09.k10\">Switching is too complicated.<\u002Fq><p data-i18n=\"p09.k11\">Web-based, login from anywhere. POP/IMAP support means existing Outlook setups keep working. Migration is one form; technical support walks you through it.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q data-i18n=\"p09.k12\">Why pay when Gmail is free?<\u002Fq><p data-i18n=\"p09.k13\">A company-branded email address is worth having for credibility. Plus you get ad-free, ownership of the address, task box, calendaring, multi-inbox — all bundled.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q data-i18n=\"p09.k14\">We have high employee turnover.<\u002Fq><p data-i18n=\"p09.k15\">Add/delete mailboxes in seconds from the portal. Or use role-based addresses (sales@, info@, support@) that survive any individual's tenure.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q data-i18n=\"p09.k16\">We don't have time.<\u002Fq><p data-i18n=\"p09.k17\">Web-based, no install. Setup is 10 minutes. Manage from anywhere with internet. Easier than Workspace migration.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"doc-label\" style=\"color: var(--teal);\" data-i18n=\"p09.k18\">Frequently asked questions<\u002Fdiv>\n        <div style=\"margin-top: 10px;\">\n          <div class=\"obj\"><q style=\"font-style: normal;\" data-i18n=\"p09.k19\">What is domain-based email?<\u002Fq><p data-i18n=\"p09.k20\">Email ending in your domain — sales@yourbusiness.com. Represents the brand on every contact.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q style=\"font-style: normal;\" data-i18n=\"p09.k21\">What's in the plans?<\u002Fq><p data-i18n=\"p09.k22\">Mailbox, anti-virus, anti-spam, ad-free, themes, calendar, task box (Pro+), multi-inbox (Pro+), POP/IMAP (Pro+).<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q style=\"font-style: normal;\" data-i18n=\"p09.k23\">Which package fits my needs?<\u002Fq><p data-i18n=\"p09.k24\">Count mailboxes and usage type. Heavy file collaboration → bigger mailbox. Team coordination → Premium with shared calendars.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q style=\"font-style: normal;\" data-i18n=\"p09.k25\">What if my domain is elsewhere?<\u002Fq><p data-i18n=\"p09.k26\">Technical support walks you through migration. Mail accounts move over while DNS settings update.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q style=\"font-style: normal;\" data-i18n=\"p09.k27\">How do I share a calendar?<\u002Fq><p data-i18n=\"p09.k28\">\"Share with domain users\" → read-only or read+edit+delete. Everyone on the same domain can subscribe.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q style=\"font-style: normal;\" data-i18n=\"p09.k29\">Emails going to spam?<\u002Fq><p data-i18n=\"p09.k30\">Add the sender to the trusted senders list. Their emails arrive regardless of spam filter level.<\u002Fp><\u002Fdiv>\n          <div class=\"obj\"><q style=\"font-style: normal;\" data-i18n=\"p09.k31\">Can we white-label the inbox?<\u002Fq><p data-i18n=\"p09.k32\">Yes. Themes include color and background image customization. Branded experience per partner or customer.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"pchrome-bot\"><span data-i18n=\"p09.k33\">Objection handling · FAQs<\u002Fspan><span>09<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page cream\">\n  <div class=\"pchrome-top\"><span class=\"brandmark\" style=\"font-size: 10px;\" data-i18n=\"p10.k01\"><span class=\"glyph\" style=\"width: 16px; height: 16px;\"><\u002Fspan>Product Template<\u002Fspan><span data-i18n=\"p10.k02\">09 — For service providers<\u002Fspan><\u002Fdiv>\n  <div class=\"pbody\">\n    <div class=\"doc-eyebrow\" data-i18n=\"p10.k03\">09 — For service providers<\u002Fdiv>\n    <h1 class=\"doc-h1\" style=\"margin-top: 12px;\" data-i18n=\"p10.k04\">The universal domain attach.<\u002Fh1>\n    <p class=\"doc-p lede\" style=\"margin-top: 18px; max-width: 580px;\" data-i18n=\"p10.k05\">Business Class Email is the highest-attach product to domain registrations. Nearly every domain customer is a candidate, and the productivity bundle drives much higher per-customer revenue than email-only hosts.<\u002Fp>\n    <div style=\"margin-top: 28px;\">\n      <div class=\"bul\" data-i18n=\"p10.k06\" data-html=\"true\"><strong>Universal attach.<\u002Fstrong> Nearly every domain customer qualifies. \"Are you on @gmail.com?\" opens 80% of conversations.<\u002Fdiv>\n      <div class=\"bul\" data-i18n=\"p10.k07\" data-html=\"true\"><strong>Recurring revenue.<\u002Fstrong> Once a domain customer's email lives at @yourdomain.com, switching providers means switching addresses — operational lock-in.<\u002Fdiv>\n      <div class=\"bul\" data-i18n=\"p10.k08\" data-html=\"true\"><strong>Higher ARPU than email-only hosts.<\u002Fstrong> Productivity bundle (multi-inbox, tasks, calendaring) commands higher pricing than commodity mailboxes.<\u002Fdiv>\n      <div class=\"bul\" data-i18n=\"p10.k09\" data-html=\"true\"><strong>Easy upsell ladder.<\u002Fstrong> ISP Basic → BCE Pro → BCE Premium. Mailbox size + features are visible meters that grow with the business.<\u002Fdiv>\n      <div class=\"bul\" data-i18n=\"p10.k10\" data-html=\"true\"><strong>White-label ready.<\u002Fstrong> Themes and partner branding configurable. Service providers own the customer relationship end-to-end.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top: 28px;\">\n      <div class=\"doc-label\" style=\"color: var(--teal);\" data-i18n=\"p10.k11\">Companion assets<\u002Fdiv>\n      <div style=\"margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;\">\n        <div style=\"padding: 16px; background: var(--white); border: 1px solid var(--rule);\"><div class=\"doc-label\" data-i18n=\"p10.k12\">Asset 01<\u002Fdiv><h4 style=\"font-family: var(--serif); font-size: 16px; margin-top: 6px; font-weight: 400;\" data-i18n=\"p10.k13\">Sales Presentation<\u002Fh4><p class=\"doc-p\" style=\"margin-top: 6px; font-size: 11.5px;\" data-i18n=\"p10.k14\">13-slide deck with 75% trust-stat framing.<\u002Fp><\u002Fdiv>\n        <div style=\"padding: 16px; background: var(--white); border: 1px solid var(--rule);\"><div class=\"doc-label\" data-i18n=\"p10.k15\">Asset 02<\u002Fdiv><h4 style=\"font-family: var(--serif); font-size: 16px; margin-top: 6px; font-weight: 400;\" data-i18n=\"p10.k16\">Sales Slick<\u002Fh4><p class=\"doc-p\" style=\"margin-top: 6px; font-size: 11.5px;\" data-i18n=\"p10.k17\">Three-page leave-behind with 3-tier ladder.<\u002Fp><\u002Fdiv>\n        <div style=\"padding: 16px; background: var(--white); border: 1px solid var(--rule);\"><div class=\"doc-label\" data-i18n=\"p10.k18\">Pair with<\u002Fdiv><h4 style=\"font-family: var(--serif); font-size: 16px; margin-top: 6px; font-weight: 400;\" data-i18n=\"p10.k19\">Domain registration<\u002Fh4><p class=\"doc-p\" style=\"margin-top: 6px; font-size: 11.5px;\" data-i18n=\"p10.k20\">Highest-attach product in the catalog.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex: 1;\"><\u002Fdiv>\n    <div style=\"padding: 24px 28px; background: var(--ink); color: var(--paper);\">\n      <div style=\"font-family: var(--serif); font-size: 26px; color: var(--paper);\" data-i18n=\"cta.title\">Get Started<\u002Fdiv>\n      <div style=\"font-size: 13px; line-height: 1.55; margin-top: 10px; color: rgba(245,239,227,0.92); max-width: 660px;\" data-i18n=\"cta.contactfull\" data-html=\"true\">Have questions, want to schedule a demo, or explore how these solutions can support your sales teams today? Contact us at <a href=\"mailto:marketing@hostopia.com\" style=\"color: var(--paper); text-decoration: underline;\">marketing@hostopia.com<\u002Fa> to learn more and connect with one of our experts.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"pchrome-bot\"><span data-i18n=\"p10.k23\">© 2026 · Generic Product Template · v2.1 · All rights reserved<\u002Fspan><span>10<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>const LANG = window.LANG = {};<\u002Fscript>\n<script src=\"5c8829cc-e576-4197-8678-bdb389075cfa\"><\u002Fscript>\n<script>\nfunction applyLang(l){const d=LANG[l];if(!d)return;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(d[k]===undefined)return;if(el.hasAttribute('data-html'))el.innerHTML=d[k];else el.textContent=d[k];});document.documentElement.lang=l;document.querySelectorAll('#lang-toggle button').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));try{localStorage.setItem('beOverviewLang',l);}catch(e){}}\nwindow.applyLang=applyLang;\ndocument.querySelectorAll('#lang-toggle button').forEach(b=>b.addEventListener('click',()=>applyLang(b.dataset.lang)));\nconst s=(()=>{try{return localStorage.getItem('beOverviewLang');}catch(e){return null;}})();\nif(s&&LANG[s])applyLang(s);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
